<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Random Quest 🚀</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Caveat:wght@700&display=swap');
        :root { --neon-green: #39ff14; --neon-blue: #00ffff; --pink: #ff75c3; --bg-dark: #050510; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; height: 100vh; background: var(--bg-dark) no-repeat center center/cover; color: white; overflow: hidden; display: flex; flex-direction: column; align-items: center; transition: 0.5s; }
        
        .brand-name { margin-top: 20px; font-size: 2.2rem; font-weight: 900; background: linear-gradient(45deg, var(--neon-green), var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 8px var(--neon-green)); }
        .top-controls { position: absolute; top: 15px; width: 90%; display: flex; justify-content: space-between; z-index: 1000; }
        .icon-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(57, 255, 20, 0.2); color: white; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: 0.3s; }
        
        .challenge-card { background: rgba(0, 0, 0, 0.7); border: 1px solid var(--neon-green); padding: 20px; border-radius: 25px; width: 85%; margin-top: 20px; box-shadow: 0 0 20px rgba(57, 255, 20, 0.1); }
        .btn-main { background: linear-gradient(135deg, var(--neon-green), var(--neon-blue)); color: black; border: none; padding: 15px 50px; border-radius: 50px; font-size: 1.4rem; font-weight: bold; margin-top: 20px; cursor: pointer; box-shadow: 0 0 15px var(--neon-green); }

        #gameSection { display: none; width: 90%; margin-top: 15px; }
        #activeGameContainer { background: #000; border: 2px solid rgba(57, 255, 20, 0.3); border-radius: 20px; min-height: 260px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }

        /* Pepe Jump Style */
        #pepeGame { width: 100%; height: 260px; position: relative; display: none; background: #000; }
        #pepe { width: 50px; height: 50px; position: absolute; bottom: 10px; left: 40px; font-size: 2.8rem; filter: drop-shadow(0 0 12px var(--neon-green)); z-index: 10; display: flex; align-items: center; justify-content: center; }
        .obstacle { width: 30px; height: 30px; position: absolute; bottom: 12px; left: 100%; font-size: 1.8rem; filter: drop-shadow(0 0 10px var(--neon-blue)); }
        #gameScore { position: absolute; top: 10px; left: 10px; color: var(--neon-green); font-family: monospace; font-size: 1.2rem; z-index: 20; }

        /* Progress & Admin */
        .progress-container { width: 85%; margin-top: 20px; }
        .progress-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--neon-green); width: 0%; box-shadow: 0 0 10px var(--neon-green); transition: 1s; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; padding: 20px; box-sizing: border-box; overflow-y: auto; text-align: right; }
        .admin-sec { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        input { width: 92%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #111; color: white; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; color: white; margin-top: 10px; }
        th, td { border-bottom: 1px solid #333; padding: 8px; text-align: center; }
        .delete-btn { background: #ff4757; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        .reset-btn { background: #ffa500; color: black; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }
    </style>
</head>
<body onmousedown="pepeJump()" ontouchstart="pepeJump()">

    <div class="top-controls">
        <button id="bgBtn" class="icon-btn" onclick="document.getElementById('bgInput').click(); event.stopPropagation();" style="display:none;">🖼️</button>
        <button id="adminBtn" class="icon-btn" onclick="openAdmin(); event.stopPropagation();" style="display:none;">⚙️</button>
    </div>
    <input type="file" id="bgInput" hidden accept="image/*" onchange="uploadBG(this)">

    <div class="brand-name">Random Quest</div>

    <div id="questUI" style="display:none;">
        <div class="challenge-card">
            <div id="dailyTask" style="font-size: 1.4rem; font-weight: 800;">جاري التحميل...</div>
            <div id="dailyTaskEn" style="font-size: 0.8rem; opacity: 0.4; margin-top: 8px;">...</div>
        </div>
        <button id="doneBtn" class="btn-main" onclick="handleDone()">FIT / تم ✅</button>
    </div>

    <div id="gameSection">
        <div style="display: flex; gap: 15px; justify-content: center; margin-bottom: 15px;">
            <button class="icon-btn" onclick="initMemoryGame(); event.stopPropagation();">🧠</button>
            <button class="icon-btn" onclick="initPepeGame(); event.stopPropagation();">🐸</button>
            <button class="icon-btn" onclick="initBubbleGame(); event.stopPropagation();">🫧</button>
        </div>
        <div id="activeGameContainer">
            <div id="pepeGame">
                <div id="gameScore">0</div>
                <div id="pepe">🐸</div>
                <div id="obstacle" class="obstacle">✈️</div>
            </div>
        </div>
        <div style="font-size: 0.7rem; margin-top:10px; opacity: 0.7;">
            <div id="personalBest">أعلى سكور: 0</div>
            <div id="globalLeader" style="color:var(--neon-green);">المتصدر: ...</div>
        </div>
    </div>

    <div class="progress-container">
        <span id="progressText" style="font-size: 0.8rem; color: var(--neon-green);">إنجازك: 0 / 30 🔥</span>
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
    </div>
    <div id="statusArea" style="display:none; margin-top: 10px;">
        <div id="nextQuestTimer" style="color: var(--pink); font-weight: bold; font-size: 0.9rem;">00:00:00</div>
    </div>

    <div id="adminPanel" class="modal">
        <button onclick="closeAdmin();" style="color:#ff4757; background:none; border:none; font-size:2rem; float:left;">×</button>
        <h2 style="color:var(--neon-green); text-align:center;">لوحة التحكم 🛠</h2>
        
        <div class="admin-sec">
            <h3>➕ إضافة تحدي</h3>
            <input type="text" id="newAr" placeholder="التحدي بالعربي">
            <input type="text" id="newEn" placeholder="Challenge in English">
            <button onclick="addNewChallenge()" style="background:var(--neon-green); border:none; padding:10px 20px; border-radius:8px; font-weight:bold; color:black;">حفظ التحدي</button>
        </div>

        <div class="admin-sec">
            <h3>📋 التحديات الحالية</h3>
            <div id="challengeListAdmin" style="max-height: 150px; overflow-y: auto;"></div>
        </div>

        <div class="admin-sec">
            <h3>👥 سجل الزوار والتحكم</h3>
            <table id="usersTable">
                <thead><tr><th>المستخدم</th><th>إنجاز</th><th>تحكم</th></tr></thead>
                <tbody id="usersListAdmin"></tbody>
            </table>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://randomquest-app-default-rtdb.firebaseio.com/";
        const tg = window.Telegram.WebApp;
        const MY_ID = 8421694319;
        const userId = tg.initDataUnsafe.user?.id || 8421694319;
        const userName = tg.initDataUnsafe.user?.first_name || "لاعب مجهول";

        let activeGame = "", currentScore = 0, isJumping = false, pepeLoop;

        firebase.initializeApp({ databaseURL: FIREBASE_URL });
        const db = firebase.database();

        if(userId == MY_ID) { document.getElementById('bgBtn').style.display = 'flex'; document.getElementById('adminBtn').style.display = 'flex'; }

        function uploadBG(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => { document.body.style.backgroundImage = `url(${e.target.result})`; localStorage.setItem('userBG', e.target.result); };
            reader.readAsDataURL(file);
        }
        if(localStorage.getItem('userBG')) document.body.style.backgroundImage = `url(${localStorage.getItem('userBG')})`;

        async function loadApp() {
            const today = new Date().toISOString().split('T')[0];
            const snap = await db.ref(`rq_users/${userId}`).once('value');
            const data = snap.val() || {};
            const history = data.history || {};
            const count = Object.keys(history).length;
            
            document.getElementById('progressFill').style.width = (Math.min(count, 30)/30*100) + "%";
            document.getElementById('progressText').innerText = `إنجازك: ${count} / 30 🔥`;

            if(history[today]) { showDoneUI(history[today].doneTime); return; }

            const tasksSnap = await db.ref('rq_challenges').once('value');
            let tasks = []; tasksSnap.forEach(t => tasks.push({...t.val(), key: t.key}));
            let available = tasks.filter(t => !Object.values(history).some(h => h.taskAr === t.ar));
            let chosen = available[Math.floor(Math.random()*available.length)] || tasks[0];
            
            document.getElementById('dailyTask').innerText = chosen?.ar || "تحدي اليوم";
            document.getElementById('dailyTaskEn').innerText = chosen?.en || "Today's Challenge";
            window.currentTaskAr = chosen?.ar;
            document.getElementById('questUI').style.display = 'block';
        }

        async function handleDone() {
            const now = Date.now();
            const today = new Date().toISOString().split('T')[0];
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            await db.ref(`rq_users/${userId}/history/${today}`).set({ done: true, doneTime: now, taskAr: window.currentTaskAr });
            await db.ref(`rq_users/${userId}/info`).update({ name: userName, lastSeen: now });
            showDoneUI(now);
        }

        function showDoneUI(doneTime) {
            document.getElementById('questUI').style.display = 'none';
            document.getElementById('gameSection').style.display = 'block';
            document.getElementById('statusArea').style.display = 'block';
            const timer = setInterval(() => {
                const diff = (doneTime + 86400000) - Date.now();
                if(diff <= 0) { clearInterval(timer); location.reload(); }
                const h = Math.floor(diff/36e5).toString().padStart(2,'0');
                const m = Math.floor((diff%36e5)/6e4).toString().padStart(2,'0');
                const s = Math.floor((diff%6e4)/1000).toString().padStart(2,'0');
                document.getElementById('nextQuestTimer').innerText = `التحدي القادم: ${h}:${m}:${s}`;
            }, 1000);
        }

        function stopAll() {
            activeGame = ""; clearInterval(pepeLoop);
            document.getElementById('pepeGame').style.display = 'none';
            document.getElementById('activeGameContainer').innerHTML = '<div id="pepeGame"><div id="gameScore">0</div><div id="pepe">🐸</div><div id="obstacle" class="obstacle">✈️</div></div>';
        }

        function initPepeGame() {
            stopAll(); activeGame = "Pepe";
            document.getElementById('pepeGame').style.display = 'block';
            let obsPos = 100; currentScore = 0;
            pepeLoop = setInterval(() => {
                obsPos -= 1.8;
                if(obsPos < -10) { obsPos = 100; currentScore++; document.getElementById('gameScore').innerText = currentScore; }
                document.getElementById('obstacle').style.left = obsPos + "%";
                let pBottom = parseInt(window.getComputedStyle(document.getElementById('pepe')).bottom);
                if(obsPos > 10 && obsPos < 22 && pBottom < 45) {
                    clearInterval(pepeLoop); syncScore("PepeJump", currentScore);
                    document.getElementById('pepe').innerText = "💀";
                    setTimeout(initPepeGame, 1000);
                }
            }, 10);
        }

        function pepeJump() {
            if(activeGame !== "Pepe" || isJumping) return;
            isJumping = true;
            const p = document.getElementById('pepe');
            p.style.transition = "bottom 0.2s cubic-bezier(0.4, 0, 0.2, 1)";
            p.style.bottom = "130px";
            setTimeout(() => { p.style.bottom = "10px"; setTimeout(()=>isJumping=false, 200); }, 250);
        }

        function initMemoryGame() {
            stopAll(); activeGame = "Memory";
            const container = document.getElementById('activeGameContainer');
            container.innerHTML = '<div style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px;"></div>';
            const icons = ['🔥','💎','🚀','🌙','⚡️','👾','🍀','🎨','🧸','🌈','🍕','🍎','🎸','🎲','🧩','🎭'];
            const gameIcons = [...icons].sort(() => Math.random() - 0.5).slice(0, 8);
            const finalIcons = [...gameIcons, ...gameIcons].sort(() => Math.random() - 0.5);
            let flipped = [];
            finalIcons.forEach(icon => {
                const card = document.createElement('div');
                card.style = "width:45px; height:45px; background:rgba(255,255,255,0.05); border:1px solid var(--neon-green); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.5rem;";
                card.onclick = (e) => { e.stopPropagation();
                    if(flipped.length < 2 && !card.innerText) {
                        card.innerText = icon; flipped.push(card);
                        if(flipped.length === 2) {
                            if(flipped[0].innerText === flipped[1].innerText) { currentScore+=10; syncScore("Memory", currentScore); flipped=[]; }
                            else { setTimeout(() => { flipped.forEach(c => c.innerText=''); flipped=[]; }, 500); }
                        }
                    }
                };
                container.firstChild.appendChild(card);
            });
        }

        function initBubbleGame() {
            stopAll(); activeGame = "Bubbles";
            const container = document.getElementById('activeGameContainer');
            container.innerHTML = "";
            pepeLoop = setInterval(() => {
                const b = document.createElement('div');
                const size = Math.random()*30+20;
                b.style = `position:absolute; width:${size}px; height:${size}px; background:radial-gradient(circle, var(--neon-blue), transparent); border-radius:50%; left:${Math.random()*80}%; top:${Math.random()*80}%; cursor:pointer; filter:drop-shadow(0 0 5px var(--neon-blue)); border:1px solid white;`;
                b.onclick = (e) => { e.stopPropagation(); currentScore++; b.remove(); syncScore("Bubbles", currentScore); };
                container.appendChild(b);
                setTimeout(() => b.remove(), 1500);
            }, 700);
        }

        async function syncScore(game, score) {
            const ref = db.ref(`rq_leaderboards/${game}`);
            const snap = await ref.child(userId).once('value');
            if(score > (snap.val()?.score || 0)) await ref.child(userId).set({name: userName, score});
            ref.orderByChild('score').limitToLast(1).on('value', s => {
                s.forEach(c => document.getElementById('globalLeader').innerText = `المتصدر (${game}): ${c.val().name} - ${c.val().score}`);
            });
            document.getElementById('personalBest').innerText = `أعلى سكور لكِ: ${score}`;
        }

        // --- وظائف الإدارة ---
        async function openAdmin() {
            document.getElementById('adminPanel').style.display = 'block';
            db.ref('rq_challenges').on('value', snap => {
                const list = document.getElementById('challengeListAdmin'); list.innerHTML = "";
                snap.forEach(t => {
                    list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #333;">
                        <span>${t.val().ar}</span>
                        <button class="delete-btn" onclick="deleteChallenge('${t.key}')">حذف</button>
                    </div>`;
                });
            });
            db.ref('rq_users').on('value', snap => {
                const list = document.getElementById('usersListAdmin'); list.innerHTML = "";
                snap.forEach(u => {
                    const d = u.val();
                    const uKey = u.key;
                    const name = d.info?.name || 'مجهول';
                    const prog = Object.keys(d.history || {}).length;
                    list.innerHTML += `<tr>
                        <td>${name}</td>
                        <td>${prog} / 30</td>
                        <td><button class="reset-btn" onclick="resetUserProgress('${uKey}')">تصفير</button></td>
                    </tr>`;
                });
            });
        }

        async function resetUserProgress(uKey) {
            if(confirm("هل أنتِ متأكدة من تصفير مستوى هذا المستخدم؟ سيتم حذف جميع إنجازاته.")) {
                await db.ref(`rq_users/${uKey}/history`).remove();
                alert("تم تصفير مستوى المستخدم بنجاح.");
            }
        }

        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }
        async function addNewChallenge() {
            const ar = document.getElementById('newAr').value, en = document.getElementById('newEn').value;
            if(ar && en) { await db.ref('rq_challenges').push({ar, en}); document.getElementById('newAr').value=""; document.getElementById('newEn').value=""; }
        }
        async function deleteChallenge(key) { if(confirm("حذف؟")) await db.ref(`rq_challenges/${key}`).remove(); }

        loadApp();
    </script>
</body>
</html>
