<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zainab Pro - Game Hub 👑</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Cairo:wght@700&display=swap');
        
        :root {
            --neon-green: #39ff14;
            --neon-blue: #00ffff;
            --bg-dark: #050510;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        body {
            font-family: 'Cairo', sans-serif;
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background: var(--bg-dark) no-repeat center center/cover;
            color: white; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        .header-area { width: 100%; text-align: center; padding-top: 45px; }
        .brand-name {
            font-family: 'Montserrat', sans-serif; font-size: 2.2rem; font-weight: 900;
            background: linear-gradient(45deg, var(--neon-green), var(--neon-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--neon-green));
        }

        /* التحكم العلوي */
        .top-controls {
            position: absolute; top: 15px; width: 90%;
            display: flex; justify-content: space-between; z-index: 1000;
        }
        .icon-btn {
            background: rgba(255,255,255,0.05); border: 1.5px solid var(--neon-green);
            color: white; border-radius: 50%; width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
            backdrop-filter: blur(10px);
        }

        /* منطقة اللعب */
        #gameSection { width: 92%; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        #gameCanvas {
            background: rgba(0,0,0,0.85); border: 2px solid var(--neon-blue);
            border-radius: 30px; height: 420px; position: relative; overflow: hidden;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.2);
        }

        /* تصميم لعبة 2048 */
        .grid-2048 {
            display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr);
            gap: 8px; padding: 12px; height: 100%; background: #111; border-radius: 25px;
        }
        .tile {
            background: rgba(255,255,255,0.1); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: 900; color: white;
            transition: transform 0.1s, background 0.2s;
        }
        .tile-2 { background: #333; } .tile-4 { background: #444; }
        .tile-8 { background: #f2b179; color: black; } .tile-16 { background: #f59563; }
        .tile-32 { background: #f67c5f; } .tile-64 { background: #f65e3b; }
        .tile-128 { background: var(--neon-blue); color: black; box-shadow: 0 0 10px var(--neon-blue); }
        .tile-256, .tile-512, .tile-1024, .tile-2048 { background: var(--neon-green); color: black; box-shadow: 0 0 15px var(--neon-green); }

        /* Pepe */
        #pepe {
            width: 42px; height: 42px; position: absolute; bottom: 20px; left: 40px;
            background: #4CAF50; border-radius: 50% 50% 40% 40%; border: 2px solid #1B5E20;
            transition: bottom 0.2s;
        }

        .score-live { position: absolute; top: 15px; left: 15px; color: var(--neon-green); font-weight: 900; font-size: 1.2rem; }
        .home-btn { position: absolute; top: 15px; right: 15px; z-index: 1000; background: none; border: none; font-size: 1.5rem; cursor: pointer; }

        .progress-zone { width: 90%; padding-bottom: 30px; }
        .p-bar { height: 12px; background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        .p-fill { height: 100%; background: linear-gradient(90deg, var(--neon-green), var(--neon-blue)); width: 0%; transition: 1s; }

        .btn-menu { background: var(--neon-green); color: black; border: none; padding: 15px; width: 80%; border-radius: 15px; font-weight: 900; margin: 10px 0; font-size: 1.1rem; }
    </style>
</head>
<body onclick="handleTap()">

    <div class="top-controls">
        <button id="bgBtn" class="icon-btn" onclick="document.getElementById('bgInput').click(); event.stopPropagation();" style="display:none;">🖼️</button>
        <button id="adminBtn" class="icon-btn" onclick="openAdmin(); event.stopPropagation();" style="display:none;">⚙️</button>
    </div>
    <input type="file" id="bgInput" hidden onchange="setBG(this)">

    <div class="header-area">
        <div class="brand-name">Random Quest</div>
    </div>

    <div id="gameSection">
        <div id="gameCanvas">
            <div id="mainMenu" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%;">
                <button class="btn-menu" onclick="initGame('2048')">لعبة 2048 🧩</button>
                <button class="btn-menu" style="background:var(--neon-blue)" onclick="initGame('pepe')">قفز بيبي 🐸</button>
                <button class="btn-menu" style="background:#ff00ff" onclick="initGame('mem')">تحدي الذاكرة 🧠</button>
            </div>
        </div>
    </div>

    <div class="progress-zone">
        <div id="pText" style="font-size:0.8rem; margin-bottom:5px;">المستوى: 0 / 30 🔥</div>
        <div class="p-bar"><div id="pFill" class="p-fill"></div></div>
    </div>

    <script>
        const FIRE_URL = "https://randomquest-app-default-rtdb.firebaseio.com/";
        const tg = window.Telegram.WebApp;
        const uID = tg.initDataUnsafe.user?.id || 8421694319;

        firebase.initializeApp({ databaseURL: FIRE_URL });
        const db = firebase.database();
        let activeG = "", loops = [], board = [];

        if(uID == 8421694319) { document.getElementById('bgBtn').style.display='flex'; document.getElementById('adminBtn').style.display='flex'; }

        function handleTap() { if(activeG === 'pepe') jump(); }

        function initGame(type) {
            activeG = type; loops.forEach(clearInterval); loops = [];
            const cvs = document.getElementById('gameCanvas');
            cvs.innerHTML = `<button class="home-btn" onclick="location.reload()">🏠</button>`;

            if(type === '2048') {
                const grid = document.createElement('div'); grid.className = 'grid-2048';
                cvs.appendChild(grid);
                start2048();
            } else if(type === 'pepe') {
                cvs.innerHTML += `<div class="score-live" id="ls">0</div><div id="pepe"></div>`;
                startPepe();
            } else if(type === 'mem') {
                startMemory();
            }
        }

        /* --- LOGIC 2048 --- */
        function start2048() {
            board = Array(16).fill(0);
            addTile(); addTile();
            draw2048();
            // إضافة التحكم بالسحب (Swipe)
            let startX, startY;
            document.addEventListener('touchstart', e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; }, {passive: false});
            document.addEventListener('touchend', e => {
                let diffX = e.changedTouches[0].clientX - startX;
                let diffY = e.changedTouches[0].clientY - startY;
                if(Math.abs(diffX) > Math.abs(diffY)) {
                    if(diffX > 30) move2048('right'); else if(diffX < -30) move2048('left');
                } else {
                    if(diffY > 30) move2048('down'); else if(diffY < -30) move2048('up');
                }
            }, {passive: false});
        }

        function addTile() {
            let empty = board.map((v, i) => v === 0 ? i : null).filter(v => v !== null);
            if(empty.length) board[empty[Math.floor(Math.random()*empty.length)]] = Math.random() > 0.1 ? 2 : 4;
        }

        function draw2048() {
            const grid = document.querySelector('.grid-2048');
            if(!grid) return;
            grid.innerHTML = "";
            board.forEach(val => {
                const div = document.createElement('div');
                div.className = `tile ${val ? 'tile-'+val : ''}`;
                div.innerText = val || "";
                grid.appendChild(div);
            });
        }

        function move2048(dir) {
            if(activeG !== '2048') return;
            let oldBoard = [...board];
            // منطق الحركة (مختصر للتبسيط)
            for(let i=0; i<4; i++) {
                let row = [];
                for(let j=0; j<4; j++) {
                    let idx = (dir==='left'||dir==='right') ? i*4+j : j*4+i;
                    row.push(board[idx]);
                }
                if(dir==='right' || dir==='down') row.reverse();
                let filtered = row.filter(v => v !== 0);
                for(let j=0; j<filtered.length-1; j++) {
                    if(filtered[j] === filtered[j+1]) { filtered[j]*=2; filtered[j+1]=0; if(filtered[j]===2048) confetti(); }
                }
                filtered = filtered.filter(v => v !== 0);
                while(filtered.length < 4) filtered.push(0);
                if(dir==='right' || dir==='down') filtered.reverse();
                for(let j=0; j<4; j++) {
                    let idx = (dir==='left'||dir==='right') ? i*4+j : j*4+i;
                    board[idx] = filtered[j];
                }
            }
            if(JSON.stringify(oldBoard) !== JSON.stringify(board)) { addTile(); draw2048(); }
        }

        /* --- Pepe & Memory --- (نفس منطقك السابق مع تحسينات) */
        function startPepe() {
            let s = 0;
            const cvs = document.getElementById('gameCanvas');
            function spawn() {
                if(activeG !== 'pepe') return;
                const o = document.createElement('div'); o.className = 'tile'; 
                o.style = "position:absolute; bottom:20px; right:-50px; width:40px; height:40px; background:red; border-radius:8px; display:flex; align-items:center; justify-content:center;";
                o.innerText = "🌵"; cvs.appendChild(o);
                let x = -50;
                let m = setInterval(() => {
                    x += 7; o.style.right = x + "px";
                    let pt = document.getElementById('pepe').offsetTop;
                    if(x > (cvs.offsetWidth - 85) && x < (cvs.offsetWidth - 35) && pt > 350) {
                        clearInterval(m); alert("خسرت! سكور: " + s); initGame('pepe');
                    }
                    if(x > cvs.offsetWidth) { clearInterval(m); o.remove(); s++; document.getElementById('ls').innerText = s; }
                }, 20);
                loops.push(m);
                setTimeout(spawn, Math.random() * 1000 + 1500);
            }
            spawn();
        }

        function jump() {
            const p = document.getElementById('pepe');
            if(!p || p.style.bottom === "130px") return;
            p.style.bottom = "130px";
            setTimeout(() => { if(p) p.style.bottom = "20px"; }, 350);
        }

        function setBG(i) { const r = new FileReader(); r.onload = (e) => { document.body.style.backgroundImage = `url(${e.target.result})`; localStorage.setItem('ubg', e.target.result); }; r.readAsDataURL(i.files[0]); }
        if(localStorage.getItem('ubg')) document.body.style.backgroundImage = `url(${localStorage.getItem('ubg')})`;

    </script>
</body>
</html>
