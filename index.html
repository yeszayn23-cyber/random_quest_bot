<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Random Quest - The Queen's Edition 👑</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Tajawal:wght@700&display=swap');
        
        :root {
            --neon-green: #39ff14;
            --neon-blue: #00ffff;
            --pink: #ff75c3;
            --bg-dark: #050510;
            --glass: rgba(255, 255, 255, 0.05);
            --border-glow: 0 0 15px rgba(57, 255, 20, 0.3);
        }

        body {
            font-family: 'Montserrat', 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            background: var(--bg-dark) no-repeat center center/cover;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            position: relative;
        }

        .brand-name {
            font-size: 2.6rem;
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(45deg, var(--neon-green), var(--neon-blue), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px var(--neon-green));
            animation: flow 3s linear infinite;
        }

        @keyframes flow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .top-controls {
            position: absolute;
            top: 20px;
            width: 90%;
            left: 5%;
            display: flex;
            justify-content: space-between;
            z-index: 2000;
        }

        .icon-btn {
            background: var(--glass);
            border: 1px solid rgba(57, 255, 20, 0.3);
            color: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            backdrop-filter: blur(10px);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: var(--border-glow);
        }

        .icon-btn:active { transform: scale(0.8); }

        #gameSection {
            display: none;
            width: 94%;
            margin-top: 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .game-tabs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 15px;
        }

        #activeGameDisplay {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid var(--neon-green);
            border-radius: 30px;
            height: 320px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(57, 255, 20, 0.2), 0 0 20px rgba(0,0,0,0.5);
        }

        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 15px;
            height: 100%;
        }

        .mem-card {
            background: #0a0a1a;
            border: 1px solid var(--neon-blue);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .mem-card.flipped {
            background: #1a1a2e;
            border-color: var(--neon-green);
            transform: rotateY(180deg);
        }

        #questSection {
            display: none;
            width: 85%;
            text-align: center;
            padding: 40px 20px;
        }

        .quest-card {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid var(--neon-green);
            padding: 30px;
            border-radius: 35px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            position: relative;
        }

        .quest-card::before {
            content: "DAILY MISSION";
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--neon-green);
            color: black;
            padding: 2px 15px;
            font-size: 0.7rem;
            font-weight: bold;
            border-radius: 10px;
        }

        .progress-wrapper {
            width: 85%;
            margin: 20px 0 40px;
        }

        .bar-container {
            height: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-green), var(--neon-blue));
            width: 0%;
            transition: 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 0 15px var(--neon-green);
        }

        .admin-panel {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 9999;
            padding: 30px;
            overflow-y: scroll;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }

        .admin-card {
            background: #0f0f1f;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #222;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #444;
            color: white;
            border-radius: 12px;
            margin: 10px 0;
            box-sizing: border-box;
        }

        .btn-action {
            background: var(--neon-green);
            color: black;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #222;
        }

        .reset-badge {
            background: #ff9f43;
            color: black;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: bold;
        }

        /* زر تغيير التحدي المضاف */
        .btn-change {
            background: transparent;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            margin-top: 15px;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            font-size: 0.8rem;
            font-weight: bold;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="top-controls">
        <button id="bgBtn" class="icon-btn" onclick="document.getElementById('bgInput').click(); event.stopPropagation();" style="display:none;">🖼️</button>
        <button id="adminBtn" class="icon-btn" onclick="openAdmin(); event.stopPropagation();" style="display:none;">⚙️</button>
    </div>
    <input type="file" id="bgInput" hidden onchange="processBG(this)">

    <div class="header">
        <div class="brand-name">Random Quest</div>
    </div>

    <div id="questSection">
        <div class="quest-card">
            <h2 id="taskAr" style="margin: 0; font-size: 1.6rem;">جاري جلب التحدي...</h2>
            <p id="taskEn" style="opacity: 0.5; font-size: 0.9rem; margin-top: 10px;">...</p>
            <button class="btn-action" style="margin-top: 25px;" onclick="markAsDone()">DONE / تم ✅</button>
            <button id="changeBtn" class="btn-change" onclick="pickNewTask()">Changing the challenge / تغيير التحدي 🔄</button>
        </div>
    </div>

    <div id="gameSection">
        <div class="game-tabs">
            <button class="icon-btn" onclick="startMemory(); event.stopPropagation();">🧠</button>
            <button class="icon-btn" onclick="startBubbles(); event.stopPropagation();">🫧</button>
        </div>
        <div id="activeGameDisplay"></div>
        <div id="leaderboardNotice" style="text-align: center; font-size: 0.7rem; color: var(--neon-blue); margin-top: 10px;"></div>
    </div>

    <div class="progress-wrapper">
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
            <span id="progressText" style="font-size: 0.8rem;">المستوى: 0 / 30</span>
            <span id="streakText" style="font-size: 0.8rem; color: var(--pink);">🔥 0 أيام</span>
        </div>
        <div class="bar-container">
            <div id="progressBar" class="bar-fill"></div>
        </div>
        <div id="countdown" style="text-align: center; font-size: 0.8rem; margin-top: 10px; color: var(--neon-green); font-weight: bold;"></div>
    </div>

    <div id="adminPanel" class="admin-panel">
        <div class="admin-header">
            <h1 style="color: var(--neon-green); margin:0;">إدارة زينب 👑</h1>
            <button onclick="closeAdmin()" style="background:none; border:none; color:red; font-size:2rem;">&times;</button>
        </div>

        <div class="admin-card">
            <h3 style="margin-top:0;">➕ إضافة تحدي جديد</h3>
            <input type="text" id="newAr" placeholder="التحدي بالعربية (مثلاً: 20 ضغط)">
            <input type="text" id="newEn" placeholder="Challenge in English">
            <button class="btn-action" onclick="saveTask()">إضافة للقاعدة</button>
        </div>

        <div class="admin-card">
            <h3 style="margin-top:0;">👥 إدارة المستخدمين (تصفير)</h3>
            <div id="userManagerList"></div>
        </div>

        <div class="admin-card">
            <h3 style="margin-top:0;">📜 التحديات المتوفرة</h3>
            <div id="tasksManagerList"></div>
        </div>
    </div>

    <script>
        const DB_URL = "https://randomquest-app-default-rtdb.firebaseio.com/";
        const tg = window.Telegram.WebApp;
        const myID = 8421694319;
        const user = tg.initDataUnsafe.user || { id: myID, first_name: "زينب" };
        
        firebase.initializeApp({ databaseURL: DB_URL });
        const db = firebase.database();
        let gameActive = "", gameLoops = [];
        let currentTaskID = null;

        if(user.id == myID) {
            document.getElementById('bgBtn').style.display = 'flex';
            document.getElementById('adminBtn').style.display = 'flex';
        }

        function stopAll() {
            gameActive = "";
            gameLoops.forEach(clearInterval);
            gameLoops = [];
            document.getElementById('activeGameDisplay').innerHTML = "";
        }

        function startMemory() {
            stopAll();
            const stage = document.getElementById('activeGameDisplay');
            const grid = document.createElement('div'); grid.className = 'memory-grid';
            const icons = ['⚖️','📚','💻','💎','🔥','🚀','🌙','👾'];
            const deck = [...icons, ...icons].sort(() => Math.random() - 0.5);
            let flipped = [];

            deck.forEach(icon => {
                const c = document.createElement('div');
                c.className = 'mem-card';
                c.onclick = (e) => {
                    e.stopPropagation();
                    if(flipped.length < 2 && !c.innerText) {
                        c.innerText = icon; c.classList.add('flipped');
                        flipped.push(c);
                        if(flipped.length === 2) {
                            if(flipped[0].innerText === flipped[1].innerText) {
                                flipped = [];
                            } else {
                                setTimeout(() => {
                                    flipped.forEach(f => { f.innerText = ""; f.classList.remove('flipped'); });
                                    flipped = [];
                                }, 600);
                            }
                        }
                    }
                };
                grid.appendChild(c);
            });
            stage.appendChild(grid);
        }

        function startBubbles() {
            stopAll();
            const stage = document.getElementById('activeGameDisplay');
            let loop = setInterval(() => {
                const b = document.createElement('div');
                b.innerHTML = "🫧";
                b.style = `position:absolute; left:${Math.random()*85}%; top:${Math.random()*85}%; font-size:2.2rem; cursor:pointer; filter:drop-shadow(0 0 5px var(--neon-blue));`;
                b.onclick = (e) => { e.stopPropagation(); b.remove(); };
                stage.appendChild(b);
                setTimeout(() => b.remove(), 1200);
            }, 700);
            gameLoops.push(loop);
        }

        async function openAdmin() {
            document.getElementById('adminPanel').style.display = 'block';
            db.ref('rq_users').on('value', snap => {
                const list = document.getElementById('userManagerList');
                list.innerHTML = "";
                snap.forEach(u => {
                    const d = u.val();
                    const histCount = d.history ? Object.keys(d.history).length : 0;
                    list.innerHTML += `
                        <div class="user-row">
                            <span>${d.info?.name || 'مجهول'} (${histCount}/30)</span>
                            <span class="reset-badge" onclick="resetUserLevel('${u.key}')">تصفير المستوى</span>
                        </div>`;
                });
            });

            db.ref('rq_challenges').on('value', snap => {
                const list = document.getElementById('tasksManagerList');
                list.innerHTML = "";
                snap.forEach(t => {
                    list.innerHTML += `
                        <div class="user-row">
                            <span>${t.val().ar}</span>
                            <button onclick="delTask('${t.key}')" style="background:none; border:none; color:red;">حذف</button>
                        </div>`;
                });
            });
        }

        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }

        async function saveTask() {
            const ar = document.getElementById('newAr').value;
            const en = document.getElementById('newEn').value;
            if(ar && en) {
                await db.ref('rq_challenges').push({ ar, en });
                document.getElementById('newAr').value = "";
                document.getElementById('newEn').value = "";
            }
        }

        async function delTask(id) { if(confirm("حذف هذا التحدي؟")) await db.ref(`rq_challenges/${id}`).remove(); }

        async function resetUserLevel(id) {
            if(confirm("هل أنتِ متأكدة من تصفير مستوى هذا المستخدم نهائياً؟")) {
                await db.ref(`rq_users/${id}/history`).remove();
                alert("تم التصفير بنجاح");
            }
        }

        function processBG(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.body.style.backgroundImage = `url(${e.target.result})`;
                localStorage.setItem('custom_bg', e.target.result);
            };
            reader.readAsDataURL(input.files[0]);
        }
        if(localStorage.getItem('custom_bg')) document.body.style.backgroundImage = `url(${localStorage.getItem('custom_bg')})`;

        async function pickNewTask() {
            const userSnap = await db.ref(`rq_users/${user.id}`).once('value');
            const history = userSnap.val()?.history || {};
            const tSnap = await db.ref('rq_challenges').once('value');
            
            let tasks = [];
            tSnap.forEach(t => {
                // تصفية التحديات التي لم ينجزها المستخدم سابقاً
                if(!history[t.key]) {
                    tasks.push({id: t.key, ...t.val()});
                }
            });

            if(tasks.length > 0) {
                // استبعاد التحدي الحالي عند التغيير
                let filtered = currentTaskID ? tasks.filter(t => t.id !== currentTaskID) : tasks;
                let finalPool = filtered.length > 0 ? filtered : tasks;
                let selected = finalPool[Math.floor(Math.random() * finalPool.length)];
                
                currentTaskID = selected.id;
                document.getElementById('taskAr').innerText = selected.ar;
                document.getElementById('taskEn').innerText = selected.en;
                document.getElementById('questSection').style.display = 'block';
            } else {
                document.getElementById('taskAr').innerText = "انتهت كل التحديات! 🏆";
                document.getElementById('changeBtn').style.display = 'none';
            }
        }

        async function initApp() {
            const today = new Date().toISOString().split('T')[0];
            const snap = await db.ref(`rq_users/${user.id}`).once('value');
            const data = snap.val() || {};
            const history = data.history || {};
            const count = Object.keys(history).length;

            document.getElementById('progressBar').style.width = (Math.min(count, 30) / 30 * 100) + "%";
            document.getElementById('progressText').innerText = `المستوى: ${count} / 30`;

            if(history[today]) {
                document.getElementById('gameSection').style.display = 'block';
                document.getElementById('questSection').style.display = 'none';
                startCountdown(history[today].time);
            } else {
                pickNewTask();
            }
        }

        async function markAsDone() {
            const today = new Date().toISOString().split('T')[0];
            const now = Date.now();
            // تسجيل التحدي باستخدام المعرف الخاص به لضمان عدم تكراره
            await db.ref(`rq_users/${user.id}/history/${today}`).set({ done: true, time: now, taskID: currentTaskID });
            // تسجيل في الهيستوري العام للمستخدم لمنع ظهوره مرة أخرى
            if(currentTaskID) {
                await db.ref(`rq_users/${user.id}/history/${currentTaskID}`).set(true);
            }
            await db.ref(`rq_users/${user.id}/info`).update({ name: user.first_name, lastSeen: now });
            
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            setTimeout(() => location.reload(), 1500);
        }

        function startCountdown(startTime) {
            setInterval(() => {
                const remaining = (startTime + 86400000) - Date.now();
                if(remaining <= 0) location.reload();
                const h = Math.floor(remaining/36e5).toString().padStart(2,'0');
                const m = Math.floor((remaining%36e5)/6e4).toString().padStart(2,'0');
                const s = Math.floor((remaining%6e4)/1000).toString().padStart(2,'0');
                document.getElementById('countdown').innerText = `التحدي القادم خلال: ${h}:${m}:${s}`;
            }, 1000);
        }

        initApp();
    </script>
</body>
</html>
