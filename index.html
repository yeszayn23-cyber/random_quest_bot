<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ʀᴀɴᴅᴏᴍǫᴜᴇ𝑠ᴛ 🚀</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Amiri+Quran&family=Montserrat:wght@800&display=swap');

        :root {
            --purple: #a18cd1; --blue: #70a1ff; --green: #7bed9f; --pink: #ffafbd; --amber: #ff9f43; --bg: #0d0d0d;
        }

        body {
            font-family: 'Caveat', 'Amiri Quran', serif; margin: 0; padding: 0; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            background: var(--bg); color: white; overflow: hidden; text-align: center;
        }

        .brand-name {
            margin-top: 35px;
            font-family: 'Montserrat', sans-serif;
            font-size: 2.8rem;
            letter-spacing: -1px;
            background: linear-gradient(45deg, var(--purple), var(--blue), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            filter: drop-shadow(0px 5px 15px rgba(161, 140, 209, 0.4));
        }

        .main-challenge-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 35px 20px; border-radius: 30px; width: 85%; margin-top: 25px; min-height: 130px;
            display: flex; flex-direction: column; justify-content: center;
            backdrop-filter: blur(10px); box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* الزر الجديد "البوقوس" */
        .btn-fit {
            background: linear-gradient(135deg, #ff9f43 0%, #ff6b6b 100%);
            color: #fff; border: none; padding: 18px 70px;
            border-radius: 50px; /* دائري بالكامل */
            font-size: 1.8rem; font-family: 'Caveat', cursive; font-weight: bold;
            margin-top: 40px; cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 159, 67, 0.3), inset 0 -4px 0 rgba(0,0,0,0.2);
            position: relative; overflow: hidden;
        }

        .btn-fit:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(255, 159, 67, 0.4);
            filter: brightness(1.1);
        }

        .btn-fit:active {
            transform: translateY(2px);
            box-shadow: 0 5px 10px rgba(255, 159, 67, 0.2);
        }

        .btn-fit:disabled {
            background: #2c2c2c; color: #555; box-shadow: none; transform: none; cursor: not-allowed; filter: none;
        }

        #statusArea { margin-top: 25px; display: none; }
        .timer-box { font-size: 1.1rem; color: var(--pink); font-family: 'Montserrat', sans-serif; letter-spacing: 1px; margin-top: 10px; opacity: 0.8; }

        /* لوحة التحكم */
        #adminPanel {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; text-align: right; font-family: sans-serif;
        }
        .admin-section { background: #111; padding: 15px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #222; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 10px; }
        th, td { border: 1px solid #222; padding: 12px; text-align: center; }
        th { background: #1a1a1a; color: var(--amber); }
        textarea { width: 100%; height: 70px; background: #0a0a0a; color: #fff; border: 1px solid #333; border-radius: 12px; padding: 12px; margin-top: 5px; resize: none; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="brand-name">ʀᴀɴᴅᴏᴍǫᴜᴇ𝑠ᴛ</div>

    <div class="main-challenge-btn">
        <div id="dailyTask" style="font-size: 1.8rem; font-weight: bold; line-height: 1.4;">...</div>
        <div id="dailyTaskEn" style="font-size: 1.1rem; opacity: 0.4; margin-top: 12px; font-style: italic;">...</div>
    </div>

    <button id="doneBtn" class="btn-fit" onclick="handleDone()">FIT / تم ✅</button>

    <div id="statusArea">
        <div style="color: var(--green); font-size: 1.4rem; font-weight: bold;">أحسنتِ! نلتقي غداً 🌟</div>
        <div class="timer-box" id="nextQuestTimer">00:00:00</div>
    </div>

    <div id="adminPanel">
        <button onclick="document.getElementById('adminPanel').style.display='none'" style="color:#ff4757; background:none; border:none; font-size:1.3rem; cursor:pointer; font-weight:bold;">إغلاق ×</button>
        <h2 style="color: var(--amber); margin-bottom: 25px;">الإدارة 🛠</h2>
        
        <div class="admin-section">
            <h3 style="color: var(--blue);">👤 المستخدمين النشطين</h3>
            <div style="overflow-x: auto;">
                <table id="userTable">
                    <thead><tr><th>المستخدم</th><th>إنجاز</th><th>آخر ظهور</th></tr></thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="admin-section">
            <h3 style="color: var(--green);">📥 إضافة تحديات جديدة</h3>
            <textarea id="bulkAr" placeholder="التحدي بالعربي..."></textarea>
            <textarea id="bulkEn" placeholder="Challenge in English..."></textarea>
            <button onclick="addMultiple()" style="background:var(--green); width:100%; padding:14px; border:none; border-radius:10px; font-weight:bold; margin-top:10px; cursor:pointer; color: #000;">إرسال إلى السحابة ☁️</button>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "8066162864:AAEcmBdXICIK6Sa4mD_91TjECBvnUCOrI48";
        const FIREBASE_URL = "https://randomquest-app-default-rtdb.firebaseio.com/";

        const tg = window.Telegram.WebApp;
        tg.expand();
        const user = tg.initDataUnsafe.user || { id: 8421694319, first_name: "Admin" };
        const userId = user.id;
        const todayStr = new Date().toISOString().split('T')[0];

        firebase.initializeApp({ databaseURL: FIREBASE_URL });
        const db = firebase.database();

        function trackUser() {
            db.ref(`rq_users/${userId}/info`).update({
                name: user.first_name || "Unknown",
                lastSeen: new Date().toLocaleString(),
                id: userId
            });
        }

        async function loadChallenge() {
            const snapTasks = await db.ref('rq_challenges').once('value');
            const snapHist = await db.ref(`rq_users/${userId}/history`).once('value');
            
            let tasks = [];
            snapTasks.forEach(t => { tasks.push(t.val()); });
            
            if (tasks.length === 0) {
                document.getElementById('dailyTask').innerText = "لا توجد تحديات حالياً!";
                return;
            }

            const hist = snapHist.val() || {};
            const doneAr = Object.values(hist).map(h => h.taskAr);
            
            let available = tasks.filter(t => !doneAr.includes(t.ar));
            if(available.length === 0) available = tasks;

            const seed = new Date().getDate() + userId;
            const idx = Math.floor(Math.abs(Math.sin(seed) * 2000) % available.length);
            
            const chosen = available[idx];
            document.getElementById('dailyTask').innerText = chosen.ar;
            document.getElementById('dailyTaskEn').innerText = chosen.en;
            window.currentTaskAr = chosen.ar;
        }

        function handleDone() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ff9f43', '#ff6b6b', '#a18cd1'] });
            db.ref(`rq_users/${userId}/history/${todayStr}`).set({
                done: true, 
                taskAr: window.currentTaskAr,
                time: Date.now()
            }).then(() => showDoneUI());
        }

        function showDoneUI() {
            document.getElementById('doneBtn').disabled = true;
            document.getElementById('doneBtn').innerText = "تم بنجاح ✨";
            document.getElementById('statusArea').style.display = 'block';
            
            setInterval(() => {
                const diff = new Date().setHours(24,0,0,0) - new Date();
                const h = Math.floor(diff/36e5).toString().padStart(2,'0');
                const m = Math.floor((diff%36e5)/6e4).toString().padStart(2,'0');
                const s = Math.floor((diff%6e4)/1000).toString().padStart(2,'0');
                document.getElementById('nextQuestTimer').innerText = `NEXT QUEST IN: ${h}:${m}:${s}`;
            }, 1000);
        }

        function loadAdminData() {
            db.ref('rq_users').on('value', s => {
                const users = s.val();
                const tbody = document.getElementById('userTableBody');
                tbody.innerHTML = "";
                for(let id in users) {
                    const info = users[id].info || {name: "Guest"};
                    const score = users[id].history ? Object.keys(users[id].history).length : 0;
                    tbody.innerHTML += `<tr><td>${info.name}</td><td>${score} 🔥</td><td>${(info.lastSeen || "").split(',')[0]}</td></tr>`;
                }
            });
        }

        function addMultiple() {
            const ar = document.getElementById('bulkAr').value.split('\n').filter(x => x.trim());
            const en = document.getElementById('bulkEn').value.split('\n').filter(x => x.trim());
            if(ar.length !== en.length) { alert("عدد الأسطر غير متساوي!"); return; }
            ar.forEach((t, i) => db.ref('rq_challenges').push({ ar: t, en: en[i] }));
            alert("تم الحفظ!");
            document.getElementById('bulkAr').value = ""; document.getElementById('bulkEn').value = "";
        }

        if(userId == 8421694319) {
            const ab = document.createElement('button');
            ab.innerText="⚙️";
            ab.style="position:fixed; top:15px; right:15px; background:rgba(255,255,255,0.05); border-radius:50%; border:none; color:#555; width:40px; height:40px; cursor:pointer; z-index:2001; font-size:20px;";
            ab.onclick = () => {
                document.getElementById('adminPanel').style.display = 'block';
                loadAdminData();
            };
            document.body.appendChild(ab);
        }

        trackUser(); loadChallenge();
        db.ref(`rq_users/${userId}/history/${todayStr}`).once('value', s => { if(s.exists()) showDoneUI(); });
    </script>
</body>
</html>
