<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sultana Quest - Zainab Edition 👑</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Tajawal:wght@700&display=swap');
        
        :root {
            --neon-green: #39ff14;
            --neon-blue: #00ffff;
            --pink: #ff00ff;
            --bg-dark: #020205;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background-color: var(--bg-dark);
            background-size: cover;
            background-position: center;
            color: white; 
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* الهيدر العلوي */
        .header-main {
            width: 100%; text-align: center; padding: 40px 0 20px 0;
            z-index: 10;
        }
        .brand-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.8rem; font-weight: 900;
            background: linear-gradient(to right, var(--neon-green), var(--neon-blue), var(--pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(57, 255, 20, 0.5));
        }

        /* أزرار التحكم الجانبية */
        .side-controls {
            position: absolute; top: 15px; width: 92%;
            display: flex; justify-content: space-between; z-index: 1000;
        }
        .ctrl-btn {
            background: var(--glass); border: 2px solid var(--neon-green);
            color: white; border-radius: 50%; width: 55px; height: 55px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; backdrop-filter: blur(10px);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2);
        }

        /* منطقة اللعب الكبيرة */
        #mainContainer {
            width: 94%; flex: 1; display: flex; flex-direction: column;
            justify-content: center; position: relative;
        }

        #gameCanvas {
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid var(--neon-blue);
            border-radius: 40px;
            width: 100%; height: 450px;
            position: relative; overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0, 255, 255, 0.1), 0 0 30px rgba(0, 0, 0, 0.5);
        }

        /* Pepe Character */
        #pepePlayer {
            width: 50px; height: 50px; position: absolute;
            bottom: 25px; left: 50px; z-index: 100;
            background: #4CAF50; border-radius: 50% 50% 40% 40%;
            border: 3px solid #1B5E20; transition: bottom 0.22s cubic-bezier(0.1, 0.6, 0.1, 1);
        }
        #pepePlayer::before, #pepePlayer::after {
            content: ''; position: absolute; top: -6px; width: 14px; height: 14px;
            background: white; border-radius: 50%; border: 1px solid black;
        }
        #pepePlayer::before { left: 7px; } #pepePlayer::after { right: 7px; }

        /* Obstacles & Info */
        .obs { position: absolute; bottom: 25px; right: -70px; font-size: 2.5rem; }
        .hud-display {
            position: absolute; top: 25px; left: 0; width: 100%;
            display: flex; justify-content: space-around; z-index: 200;
        }
        .pill {
            background: rgba(0,0,0,0.8); border: 1.5px solid var(--neon-green);
            padding: 8px 20px; border-radius: 20px; font-weight: 900;
            color: var(--neon-green); font-size: 1rem;
        }

        .back-menu-btn {
            position: absolute; bottom: 20px; right: 20px;
            background: var(--neon-blue); color: black; border: none;
            padding: 10px 20px; border-radius: 15px; font-weight: bold;
        }

        /* واجهة التحدي اليومي */
        #questStage { width: 90%; text-align: center; margin-bottom: 60px; }
        .quest-box {
            background: rgba(10, 10, 20, 0.9); border: 2px solid var(--neon-green);
            padding: 40px 25px; border-radius: 45px;
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.2);
        }
        .btn-action {
            background: var(--neon-green); color: black; border: none;
            padding: 18px; width: 100%; border-radius: 20px;
            font-weight: 900; font-size: 1.3rem; margin-top: 25px;
            box-shadow: 0 8px 0 #28b80e; transition: 0.1s;
        }
        .btn-action:active { transform: translateY(4px); box-shadow: 0 4px 0 #28b80e; }

        /* التقدم العام */
        .progress-footer { width: 90%; padding-bottom: 40px; }
        .prog-label { font-size: 0.9rem; margin-bottom: 10px; color: #888; display: flex; justify-content: space-between; }
        .prog-track { height: 16px; background: #111; border-radius: 20px; overflow: hidden; border: 1px solid #333; }
        .prog-bar { height: 100%; background: linear-gradient(90deg, var(--neon-green), var(--neon-blue)); width: 0%; transition: 1.5s; }

        /* لوحة التحكم */
        .admin-modal {
            display: none; position: fixed; inset: 0; background: #000;
            z-index: 5000; padding: 30px; overflow-y: auto; text-align: right;
        }
        .input-style {
            width: 100%; padding: 15px; background: #111; border: 2px solid #333;
            color: #fff; border-radius: 15px; margin: 15px 0; font-family: inherit;
        }
    </style>
</head>
<body onclick="gameJump()">

    <div class="side-controls">
        <button id="bgTrigger" class="ctrl-btn" onclick="document.getElementById('bgFile').click(); event.stopPropagation();" style="display:none;">🖼️</button>
        <button id="adminTrigger" class="ctrl-btn" onclick="toggleAdmin(true); event.stopPropagation();" style="display:none;">⚙️</button>
    </div>
    <input type="file" id="bgFile" hidden onchange="updateBackground(this)">

    <div class="header-main">
        <div class="brand-title">Random Quest</div>
    </div>

    <div id="questStage" style="display:none;">
        <div class="quest-box">
            <div style="color:var(--neon-green); font-size:0.9rem; letter-spacing:3px; margin-bottom:15px;">DAILY MISSION</div>
            <h2 id="arabicTask" style="margin:0; font-size:2.2rem; line-height:1.4;">...</h2>
            <button class="btn-action" onclick="completeQuest()">تم الإنجاز ✅</button>
        </div>
    </div>

    <div id="mainContainer" style="display:none;">
        <div id="gameCanvas">
            <div id="gameStartUI" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:20px;">
                <button class="btn-action" style="width:70%;" onclick="startPepe(); event.stopPropagation();">العب Pepe Jump 🐸</button>
                <button class="btn-action" style="width:70%; background:var(--neon-blue); box-shadow:0 8px 0 #009999;" onclick="startMemory(); event.stopPropagation();">تحدي الذاكرة 🧠</button>
            </div>
        </div>
        <div id="highscoreDisplay" style="text-align:center; font-size:0.9rem; color:var(--neon-blue); margin-top:15px; font-weight:bold;"></div>
    </div>

    <div class="progress-footer">
        <div class="prog-label">
            <span id="progText">الرحلة: 0 / 30 يوم</span>
            <span>🔥</span>
        </div>
        <div class="prog-track"><div id="progFill" class="prog-bar"></div></div>
    </div>

    <div id="adminPanel" class="admin-modal">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="color:var(--neon-green);">لوحة تحكم زينب 👑</h2>
            <button onclick="toggleAdmin(false)" style="color:white; background:none; border:none; font-size:3rem;">&times;</button>
        </div>
        <div style="background:var(--glass); padding:20px; border-radius:25px; border:1px solid #222; margin-top:20px;">
            <h3>➕ إضافة تحدي جديد</h3>
            <input type="text" id="taskInput" class="input-style" placeholder="اكتبي المهمة هنا...">
            <button class="btn-action" onclick="pushTask()">حفظ في قاعدة البيانات</button>
        </div>
        <div id="adminUsersList" style="margin-top:30px;"></div>
    </div>

    <script>
        // إعدادات Firebase
        const DB_CONFIG = "https://randomquest-app-default-rtdb.firebaseio.com/";
        const tg = window.Telegram.WebApp;
        const ZAINAB_ID = 8421694319;
        const currentUser = tg.initDataUnsafe.user || { id: ZAINAB_ID, first_name: "زينب" };

        firebase.initializeApp({ databaseURL: DB_CONFIG });
        const database = firebase.database();

        let activeGame = "", gameIntervals = [], currentScore = 0, currentLevel = 1;

        // التحقق من هوية زينب
        if (currentUser.id == ZAINAB_ID) {
            document.getElementById('bgTrigger').style.display = 'flex';
            document.getElementById('adminTrigger').style.display = 'flex';
        }

        /* ----------------------- محرك الألعاب ----------------------- */
        function resetCanvas() {
            activeGame = "";
            gameIntervals.forEach(clearInterval);
            gameIntervals = [];
            document.getElementById('gameCanvas').innerHTML = `
                <div id="gameStartUI" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:20px;">
                    <button class="btn-action" style="width:70%;" onclick="startPepe(); event.stopPropagation();">العب Pepe Jump 🐸</button>
                    <button class="btn-action" style="width:70%; background:var(--neon-blue); box-shadow:0 8px 0 #009999;" onclick="startMemory(); event.stopPropagation();">تحدي الذاكرة 🧠</button>
                </div>`;
        }

        function startPepe() {
            activeGame = "pepe";
            currentScore = 0; currentLevel = 1;
            const cvs = document.getElementById('gameCanvas');
            cvs.innerHTML = `
                <div class="hud-display">
                    <div class="pill" id="scoreHUD">Score: 0</div>
                    <div class="pill" id="lvlHUD" style="border-color:var(--neon-blue); color:var(--neon-blue);">Lvl: 1</div>
                </div>
                <div id="pepePlayer"></div>
                <button class="back-menu-btn" onclick="event.stopPropagation(); resetCanvas();">الخروج 🏠</button>
            `;

            function createObs() {
                if (activeGame !== "pepe") return;
                const o = document.createElement('div');
                o.className = "obs";
                o.innerHTML = ["🌵", "🔥", "🧱", "💣"][Math.floor(Math.random() * 4)];
                cvs.appendChild(o);

                let x = -70;
                let speed = 6.5 + (currentLevel * 0.6); // زيادة السرعة مع المستوى

                let move = setInterval(() => {
                    x += speed;
                    o.style.right = x + "px";

                    let p = document.getElementById('pepePlayer');
                    if(!p) return;
                    
                    // منطق الاصطدام المطور
                    let pRect = p.getBoundingClientRect();
                    let oRect = o.getBoundingClientRect();

                    if (oRect.left < pRect.right && oRect.right > pRect.left && oRect.top < pRect.bottom) {
                        clearInterval(move);
                        alert(`خسرتي! المستوى: ${currentLevel}\nالسكور: ${currentScore}`);
                        saveHighscore(currentScore, currentLevel);
                        resetCanvas();
                    }

                    if (x > cvs.offsetWidth) {
                        clearInterval(move);
                        o.remove();
                        currentScore += 10;
                        document.getElementById('scoreHUD').innerText = "Score: " + currentScore;
                        
                        // ترقية المستوى
                        if (currentScore % 60 === 0 && currentLevel < 30) {
                            currentLevel++;
                            document.getElementById('lvlHUD').innerText = "Lvl: " + currentLevel;
                            confetti({ particleCount: 50, spread: 60 });
                        }
                    }
                }, 20);
                gameIntervals.push(move);
                
                let nextSpawn = Math.max(700, 2000 - (currentLevel * 100));
                setTimeout(createObs, Math.random() * 500 + nextSpawn);
            }
            createObs();
        }

        function gameJump() {
            if (activeGame !== "pepe") return;
            const p = document.getElementById('pepePlayer');
            if (p.style.bottom === "140px") return;
            p.style.bottom = "140px";
            setTimeout(() => { if(p) p.style.bottom = "25px"; }, 350);
        }

        function startMemory() {
            activeGame = "memory";
            const cvs = document.getElementById('gameCanvas');
            cvs.innerHTML = `<button class="back-menu-btn" style="top:10px; bottom:auto;" onclick="event.stopPropagation(); resetCanvas();">الخروج 🏠</button>`;
            const grid = document.createElement('div');
            grid.style = "display:grid; grid-template-columns:repeat(4,1fr); gap:12px; padding:70px 20px 20px; height:100%;";
            
            const icons = ['👑','⭐','💎','🍎','🚀','🌙','👾','🔥'];
            const deck = [...icons, ...icons].sort(() => Math.random() - 0.5);
            let flipped = [];

            deck.forEach(icon => {
                const card = document.createElement('div');
                card.style = "background:#111; border:2px solid var(--neon-blue); border-radius:15px; display:flex; align-items:center; justify-content:center; font-size:1.8rem; height:65px;";
                card.onclick = (e) => {
                    e.stopPropagation();
                    if (flipped.length < 2 && !card.innerText) {
                        card.innerText = icon;
                        card.style.background = "#1a1a1a";
                        flipped.push(card);
                        if (flipped.length === 2) {
                            if (flipped[0].innerText === flipped[1].innerText) {
                                flipped = [];
                                confetti({particleCount: 20});
                            } else {
                                setTimeout(() => {
                                    flipped.forEach(c => { c.innerText = ""; c.style.background = "#111"; });
                                    flipped = [];
                                }, 500);
                            }
                        }
                    }
                };
                grid.appendChild(card);
            });
            cvs.appendChild(grid);
        }

        /* ----------------------- إدارة البيانات ----------------------- */
        async function initApp() {
            const today = new Date().toISOString().split('T')[0];
            const snap = await database.ref(`rq_users/${currentUser.id}`).once('value');
            const data = snap.val() || {};
            const history = data.history || {};
            const dayCount = Object.keys(history).length;

            document.getElementById('progText').innerText = `الرحلة: ${dayCount} / 30 يوم`;
            document.getElementById('progFill').style.width = (dayCount / 30 * 100) + "%";

            if (history[today]) {
                document.getElementById('mainContainer').style.display = 'flex';
                updateHighscoreUI();
            } else {
                const taskSnap = await database.ref('rq_challenges').once('value');
                let tasks = [];
                taskSnap.forEach(t => tasks.push(t.val().ar));
                document.getElementById('arabicTask').innerText = tasks[Math.floor(Math.random() * tasks.length)] || "ابتسمي!";
                document.getElementById('questStage').style.display = 'block';
            }
        }

        async function completeQuest() {
            const today = new Date().toISOString().split('T')[0];
            await database.ref(`rq_users/${currentUser.id}/history/${today}`).set({ done: true, ts: Date.now() });
            confetti();
            setTimeout(() => location.reload(), 1200);
        }

        async function saveHighscore(s, l) {
            const ref = database.ref(`rq_scores/${currentUser.id}`);
            const sn = await ref.once('value');
            if (s > (sn.val()?.score || 0)) {
                await ref.set({ name: currentUser.first_name, score: s, level: l });
            }
        }

        function updateHighscoreUI() {
            database.ref('rq_scores').orderByChild('score').limitToLast(1).on('value', snap => {
                snap.forEach(d => {
                    document.getElementById('highscoreDisplay').innerText = `🏆 البطل الحالي: ${d.val().name} (Level ${d.val().level})`;
                });
            });
        }

        /* ----------------------- الإدارة والخلفية ----------------------- */
        function toggleAdmin(show) { document.getElementById('adminPanel').style.display = show ? 'block' : 'none'; }
        
        async function pushTask() {
            const val = document.getElementById('taskInput').value;
            if (val) {
                await database.ref('rq_challenges').push({ ar: val });
                document.getElementById('taskInput').value = "";
                alert("تمت الإضافة يا زينب!");
            }
        }

        function updateBackground(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.body.style.backgroundImage = `url(${e.target.result})`;
                localStorage.setItem('custom_bg', e.target.result);
            };
            reader.readAsDataURL(input.files[0]);
        }

        if (localStorage.getItem('custom_bg')) {
            document.body.style.backgroundImage = `url(${localStorage.getItem('custom_bg')})`;
        }

        // انطلاق التطبيق
        initApp();
    </script>
</body>
</html>
