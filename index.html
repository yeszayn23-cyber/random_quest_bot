<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Random Quest - The Queen's Edition 👑</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Tajawal:wght@700&display=swap');
        
        :root {
            --neon-green: #39ff14;
            --neon-blue: #00ffff;
            --pink: #ff75c3;
            --bg-dark: #050510;
            --glass: rgba(255, 255, 255, 0.05);
            --border-glow: 0 0 15px rgba(57, 255, 20, 0.3);
        }

        body {
            font-family: 'Montserrat', 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            background: var(--bg-dark) no-repeat center center/cover;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            position: relative;
        }

        .brand-name {
            font-size: 2.6rem;
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(45deg, var(--neon-green), var(--neon-blue), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px var(--neon-green));
            animation: flow 3s linear infinite;
        }

        @keyframes flow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .top-controls {
            position: absolute;
            top: 20px;
            width: 90%;
            left: 5%;
            display: flex;
            justify-content: space-between;
            z-index: 2000;
        }

        .icon-btn {
            background: var(--glass);
            border: 1px solid rgba(57, 255, 20, 0.3);
            color: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            backdrop-filter: blur(10px);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: var(--border-glow);
        }

        #gameSection {
            display: none;
            width: 94%;
            margin-top: 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .game-tabs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 15px;
        }

        #activeGameDisplay {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid var(--neon-green);
            border-radius: 30px;
            height: 320px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(57, 255, 20, 0.2), 0 0 20px rgba(0,0,0,0.5);
        }

        #pepe {
            width: 45px;
            height: 45px;
            position: absolute;
            bottom: 15px;
            left: 45px;
            font-size: 2.5rem;
            z-index: 100;
            transition: bottom 0.2s cubic-bezier(0.1, 0.5, 0.1, 1);
        }

        .obs {
            position: absolute;
            bottom: 15px;
            right: -60px;
            width: 30px;
            height: 30px;
            font-size: 1.6rem;
        }

        .score-box {
            position: absolute;
            top: 15px;
            left: 20px;
            font-family: monospace;
            font-size: 1.4rem;
            color: var(--neon-green);
            text-shadow: 0 0 5px var(--neon-green);
            z-index: 1000;
        }

        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 15px;
            height: 100%;
        }

        .mem-card {
            background: #0a0a1a;
            border: 1px solid var(--neon-blue);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            cursor: pointer;
        }

        .mem-card.flipped {
            background: #1a1a2e;
            border-color: var(--neon-green);
        }

        #questSection {
            display: none;
            width: 85%;
            text-align: center;
            padding: 40px 20px;
        }

        .quest-card {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid var(--neon-green);
            padding: 30px;
            border-radius: 35px;
            position: relative;
        }

        .progress-wrapper {
            width: 85%;
            margin: 20px 0 40px;
        }

        .bar-container {
            height: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-green), var(--neon-blue));
            width: 0%;
            transition: 1.5s;
        }

        .admin-panel {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 9999;
            padding: 30px;
            overflow-y: scroll;
        }

        .admin-card {
            background: #0f0f1f;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #444;
            color: white;
            border-radius: 12px;
            margin: 10px 0;
        }

        .btn-action {
            background: var(--neon-green);
            color: black;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #222;
        }
    </style>
</head>
<body onclick="handleGlobalJump()">

    <div class="top-controls">
        <button id="bgBtn" class="icon-btn" onclick="document.getElementById('bgInput').click(); event.stopPropagation();" style="display:none;">🖼️</button>
        <button id="adminBtn" class="icon-btn" onclick="openAdmin(); event.stopPropagation();" style="display:none;">⚙️</button>
    </div>
    <input type="file" id="bgInput" hidden onchange="processBG(this)">

    <div class="header">
        <div class="brand-name">Random Quest</div>
    </div>

    <div id="questSection">
        <div class="quest-card">
            <h2 id="taskAr" style="margin: 0; font-size: 1.6rem;">جاري جلب التحدي...</h2>
            <p id="taskEn" style="opacity: 0.5; font-size: 0.9rem; margin-top: 10px;">...</p>
            <button class="btn-action" style="margin-top: 25px;" onclick="markAsDone()">DONE / تم ✅</button>
        </div>
    </div>

    <div id="gameSection">
        <div class="game-tabs">
            <button class="icon-btn" onclick="startMemory(); event.stopPropagation();">🧠</button>
            <button class="icon-btn" onclick="startPepe(); event.stopPropagation();">🐸</button>
            <button class="icon-btn" onclick="startReflex(); event.stopPropagation();">🎯</button>
        </div>
        <div id="activeGameDisplay"></div>
        <div id="leaderboardNotice" style="width:100%; margin-top:10px;"></div>
    </div>

    <div class="progress-wrapper">
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
            <span id="progressText" style="font-size: 0.8rem;">المستوى: 0 / 30</span>
            <span id="streakText" style="font-size: 0.8rem; color: var(--pink);">🔥 0 أيام</span>
        </div>
        <div class="bar-container">
            <div id="progressBar" class="bar-fill"></div>
        </div>
        <div id="countdown" style="text-align: center; font-size: 0.8rem; margin-top: 10px; color: var(--neon-green); font-weight: bold;"></div>
    </div>

    <div id="adminPanel" class="admin-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1 style="color: var(--neon-green); margin:0;">إدارة زينب 👑</h1>
            <button onclick="closeAdmin()" style="background:none; border:none; color:red; font-size:2rem;">&times;</button>
        </div>
        <div class="admin-card">
            <h3>➕ إضافة تحدي جديد</h3>
            <input type="text" id="newAr" placeholder="التحدي بالعربية">
            <input type="text" id="newEn" placeholder="Challenge in English">
            <button class="btn-action" onclick="saveTask()">إضافة</button>
        </div>
        <div id="userManagerList"></div>
        <div id="tasksManagerList"></div>
    </div>

    <script>
        const DB_URL = "https://randomquest-app-default-rtdb.firebaseio.com/";
        const tg = window.Telegram.WebApp;
        const myID = 8421694319;
        const user = tg.initDataUnsafe.user || { id: myID, first_name: "زينب" };
        
        firebase.initializeApp({ databaseURL: DB_URL });
        const db = firebase.database();
        let gameActive = "", gameLoops = [];

        if(user.id == myID) {
            document.getElementById('bgBtn').style.display = 'flex';
            document.getElementById('adminBtn').style.display = 'flex';
        }

        function stopAll() {
            gameActive = "";
            gameLoops.forEach(clearInterval);
            gameLoops = [];
            document.getElementById('activeGameDisplay').innerHTML = "";
        }

        // --- 1. التحديات العشوائية الفريدة ---
        async function initApp() {
            const today = new Date().toISOString().split('T')[0];
            const userSnap = await db.ref(`rq_users/${user.id}`).once('value');
            const data = userSnap.val() || {};
            const history = data.history || {};
            const count = Object.keys(history).length;

            document.getElementById('progressBar').style.width = (Math.min(count, 30) / 30 * 100) + "%";
            document.getElementById('progressText').innerText = `المستوى: ${count} / 30`;

            if(history[today]) {
                document.getElementById('gameSection').style.display = 'block';
                document.getElementById('questSection').style.display = 'none';
                renderLeaderboard();
                startCountdown(history[today].time);
            } else {
                const tSnap = await db.ref('rq_challenges').once('value');
                let allTasks = [];
                tSnap.forEach(t => allTasks.push({id: t.key, ...t.val()}));
                
                // فلترة التحديات التي لم يقم بها المستخدم من قبل
                const completedIds = Object.values(history).map(h => h.taskId);
                const availableTasks = allTasks.filter(t => !completedIds.includes(t.id));
                const finalTask = (availableTasks.length > 0) ? 
                    availableTasks[Math.floor(Math.random() * availableTasks.length)] : 
                    allTasks[Math.floor(Math.random() * allTasks.length)];

                document.getElementById('taskAr').innerText = finalTask.ar;
                document.getElementById('taskEn').innerText = finalTask.en;
                document.getElementById('taskAr').dataset.currentId = finalTask.id;
                document.getElementById('questSection').style.display = 'block';
            }
        }

        // --- 2. لعبة Reflex Master المتطورة ---
        function startReflex() {
            stopAll(); gameActive = "reflex";
            const stage = document.getElementById('activeGameDisplay');
            stage.innerHTML = `<div class="score-box" id="rs">SCORE: 0</div>`;
            let score = 0, speed = 1000;

            function spawn() {
                if(gameActive !== "reflex") return;
                const target = document.createElement('div');
                const size = Math.max(35, 60 - (score * 0.8));
                target.style = `position:absolute; width:${size}px; height:${size}px; background:var(--neon-blue); border-radius:50%; 
                                left:${Math.random()*80}%; top:${Math.random()*80}%; cursor:pointer; box-shadow:0 0 15px var(--neon-blue);`;
                
                target.onclick = (e) => {
                    e.stopPropagation();
                    score++;
                    document.getElementById('rs').innerText = "SCORE: " + score;
                    speed *= 0.96;
                    target.remove();
                    spawn();
                };
                stage.appendChild(target);
                
                const timeout = setTimeout(() => {
                    if(target.parentElement) {
                        alert("انتهى الوقت! سكورك: " + score);
                        saveHighScore(score);
                        stopAll();
                    }
                }, speed * 1.5);
                gameLoops.push(timeout);
            }
            spawn();
        }

        // --- 3. لوحة الصدارة الحقيقية ---
        async function renderLeaderboard() {
            const snap = await db.ref('rq_scores').orderByChild('score').limitToLast(5).once('value');
            let html = `<div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:15px;">
                        <h4 style="margin:0 0 10px 0; color:var(--pink); text-align:center;">🏆 أساطير اللعبة</h4>`;
            let ranks = [];
            snap.forEach(d => ranks.unshift(d.val()));
            ranks.forEach((r, i) => {
                html += `<div style="display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:5px;">
                            <span>${i+1}. ${r.name}</span>
                            <span style="color:var(--neon-green)">${r.score} PT</span>
                         </div>`;
            });
            document.getElementById('leaderboardNotice').innerHTML = html + `</div>`;
        }

        // --- بقية الدوال الأساسية ---
        function startPepe() {
            stopAll(); gameActive = "pepe";
            const stage = document.getElementById('activeGameDisplay');
            stage.innerHTML = `<div class="score-box" id="ps">0</div><div id="pepe">🐸</div>`;
            let score = 0;
            function spawn() {
                if(gameActive !== "pepe") return;
                const o = document.createElement('div');
                o.className = 'obs'; o.innerHTML = "🌵";
                stage.appendChild(o);
                let x = -60;
                let m = setInterval(() => {
                    x += 7; o.style.right = x + "px";
                    let pTop = document.getElementById('pepe').offsetTop;
                    if(x > (stage.offsetWidth - 85) && x < (stage.offsetWidth - 45) && pTop > 200) {
                        clearInterval(m); alert("خسرت! سكورك: " + score); saveHighScore(score); startPepe();
                    }
                    if(x > stage.offsetWidth) { clearInterval(m); o.remove(); score++; document.getElementById('ps').innerText = score; }
                }, 20);
                gameLoops.push(m);
                setTimeout(spawn, Math.random() * 1200 + 900);
            }
            spawn();
        }

        function handleGlobalJump() {
            if(gameActive === "pepe") {
                const p = document.getElementById('pepe');
                if(p.style.bottom === "115px") return;
                p.style.bottom = "115px";
                setTimeout(() => p.style.bottom = "15px", 350);
            }
        }

        async function saveHighScore(s) {
            const ref = db.ref(`rq_scores/${user.id}`);
            const current = await ref.once('value');
            if(s > (current.val()?.score || 0)) {
                await ref.set({ name: user.first_name, score: s });
            }
            renderLeaderboard();
        }

        function startMemory() {
            stopAll();
            const stage = document.getElementById('activeGameDisplay');
            const grid = document.createElement('div'); grid.className = 'memory-grid';
            const icons = ['⚖️','📚','💻','💎','🔥','🚀','🌙','👾'];
            const deck = [...icons, ...icons].sort(() => Math.random() - 0.5);
            let flipped = [];
            deck.forEach(icon => {
                const c = document.createElement('div');
                c.className = 'mem-card';
                c.onclick = (e) => {
                    e.stopPropagation();
                    if(flipped.length < 2 && !c.innerText) {
                        c.innerText = icon; c.classList.add('flipped'); flipped.push(c);
                        if(flipped.length === 2) {
                            if(flipped[0].innerText === flipped[1].innerText) flipped = [];
                            else setTimeout(() => { flipped.forEach(f => { f.innerText = ""; f.classList.remove('flipped'); }); flipped = []; }, 600);
                        }
                    }
                };
                grid.appendChild(c);
            });
            stage.appendChild(grid);
        }

        async function markAsDone() {
            const today = new Date().toISOString().split('T')[0];
            const taskId = document.getElementById('taskAr').dataset.currentId;
            const now = Date.now();
            await db.ref(`rq_users/${user.id}/history/${today}`).set({ done: true, time: now, taskId: taskId });
            await db.ref(`rq_users/${user.id}/info`).update({ name: user.first_name, lastSeen: now });
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            setTimeout(() => location.reload(), 1500);
        }

        function startCountdown(startTime) {
            setInterval(() => {
                const remaining = (startTime + 86400000) - Date.now();
                if(remaining <= 0) location.reload();
                const h = Math.floor(remaining/36e5).toString().padStart(2,'0');
                const m = Math.floor((remaining%36e5)/6e4).toString().padStart(2,'0');
                const s = Math.floor((remaining%6e4)/1000).toString().padStart(2,'0');
                document.getElementById('countdown').innerText = `التحدي القادم خلال: ${h}:${m}:${s}`;
            }, 1000);
        }

        // Admin functions (Simplified)
        async function openAdmin() {
            document.getElementById('adminPanel').style.display = 'block';
            db.ref('rq_challenges').on('value', snap => {
                const list = document.getElementById('tasksManagerList');
                list.innerHTML = "<h3>📜 التحديات</h3>";
                snap.forEach(t => {
                    list.innerHTML += `<div class="user-row"><span>${t.val().ar}</span><button onclick="delTask('${t.key}')" style="color:red; background:none; border:none;">حذف</button></div>`;
                });
            });
        }
        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }
        async function saveTask() {
            const ar = document.getElementById('newAr').value, en = document.getElementById('newEn').value;
            if(ar && en) { await db.ref('rq_challenges').push({ ar, en }); location.reload(); }
        }
        async function delTask(id) { if(confirm("حذف؟")) await db.ref(`rq_challenges/${id}`).remove(); }
        function processBG(input) {
            const reader = new FileReader();
            reader.onload = (e) => { document.body.style.backgroundImage = `url(${e.target.result})`; localStorage.setItem('custom_bg', e.target.result); };
            reader.readAsDataURL(input.files[0]);
        }
        if(localStorage.getItem('custom_bg')) document.body.style.backgroundImage = `url(${localStorage.getItem('custom_bg')})`;

        initApp();
    </script>
</body>
</html>
