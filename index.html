<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ʀᴀɴᴅᴏᴍǫᴜᴇsᴛ 🚀</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        /* Handwriting-style font */
        @import url('https://fonts.googleapis.com/css2?family=Chilanka&family=Cairo:wght@700&display=swap');

        :root {
            --accent-color: #ff4d6d; /* Unusual Tangerine/Pink */
            --neon-blue: #00d4ff;
        }

        body {
            font-family: 'Chilanka', cursive;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #0d0d0d no-repeat center center fixed;
            background-size: cover;
            color: white;
            overflow: hidden;
        }

        .logo-text {
            margin-top: 30px;
            font-size: 2.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            background: linear-gradient(to right, #8a2be2, #00ff00, #ff69b4, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-challenge-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 2px dashed rgba(255,255,255,0.3);
            padding: 30px;
            border-radius: 25px;
            width: 80%;
            margin-top: 30px;
            text-align: center;
        }

        .challenge-text { font-size: 1.6rem; margin-bottom: 5px; }

        /* More attractive, unusual button style */
        .btn-fit {
            background: linear-gradient(135deg, #ff4d6d 0%, #ff8a00 100%);
            color: white;
            border: none;
            padding: 18px 60px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-family: 'Chilanka', cursive;
            margin-top: 25px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            animation: pulse 2s infinite;
        }

        .btn-fit:disabled {
            background: #444;
            box-shadow: none;
            animation: none;
            cursor: not-allowed;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .stats-btn {
            margin-top: 40px;
            background: transparent;
            border: 1px solid #aaa;
            color: #eee;
            padding: 10px 20px;
            border-radius: 12px;
            font-family: 'Chilanka', cursive;
        }

        #adminPanel {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000;
            padding: 30px; box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="logo-text">ʀᴀɴᴅᴏᴍǫᴜᴇsᴛ</div>

    <div class="main-challenge-btn">
        <div class="challenge-text" id="dailyTask">...</div>
        <div style="font-size: 1rem; opacity: 0.7;" id="dailyTaskEn">...</div>
    </div>

    <button class="btn-fit" id="doneBtn" onclick="handleDone()">
        FIT / تم ✅
    </button>

    <button class="stats-btn" onclick="showStats()">
        Monthly Statistics / إحصائيات الشهر 📊
    </button>

    <div id="adminPanel">
        <button onclick="closeAdmin()" style="color: red; border: none; background: none; font-size: 1.2rem;">✖ إغلاق</button>
        <h2 style="border-bottom: 1px solid #333; padding-bottom: 10px;">لوحة التحكم 🛠</h2>
        <input type="text" id="taskAr" placeholder="التحدي الجديد (عربي)" style="width:100%; margin:10px 0; padding:10px; border-radius:8px;">
        <input type="text" id="taskEn" placeholder="New Challenge (English)" style="width:100%; margin:10px 0; padding:10px; border-radius:8px;">
        <button onclick="addNewChallenge()" style="width:100%; padding:15px; background: #00ff00; color: black; font-weight: bold; border-radius: 8px;">إرسال التحدي</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const ADMIN_ID = 8421694319;
        const userId = tg.initDataUnsafe.user?.id || "DEBUG_USER"; 
        
        const firebaseConfig = { databaseURL: "https://allahfirst-b9c52-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const todayKey = new Date().toISOString().split('T')[0]; // YYYY-MM-DD

        // 1. Theme & Background Sync
        db.ref('rq_settings/bg').on('value', s => {
            if(s.val()) document.body.style.backgroundImage = `url(${s.val()})`;
        });

        // 2. Load Daily Quest & Check Completion Status
        function loadDaily() {
            db.ref('rq_challenges').once('value', s => {
                const tasks = Object.values(s.val() || {t1: {ar: "ابتسم للغرباء", en: "Smile at strangers"}});
                const day = new Date().getDate();
                const index = (userId.toString().length + day) % tasks.length;
                document.getElementById('dailyTask').innerText = tasks[index].ar;
                document.getElementById('dailyTaskEn').innerText = tasks[index].en;
            });

            // Check if user already finished today
            db.ref(`rq_users/${userId}/history/${todayKey}`).once('value', s => {
                if(s.exists()) {
                    setDoneState();
                }
            });
        }

        function setDoneState() {
            const btn = document.getElementById('doneBtn');
            btn.innerText = "Completed / تم الإنجاز ✨";
            btn.disabled = true;
            btn.style.opacity = "0.6";
        }

        async function handleDone() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            
            // Save to Firebase under a specific date key to prevent double entries
            await db.ref(`rq_users/${userId}/history/${todayKey}`).set({
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                status: "completed"
            });
            
            setDoneState();
            tg.HapticFeedback.notificationOccurred('success');
        }

        function showStats() {
            db.ref(`rq_users/${userId}/history`).once('value', s => {
                const history = s.val() || {};
                const currentMonth = new Date().getMonth();
                const currentYear = new Date().getFullYear();
                
                let monthlyCount = 0;
                Object.keys(history).forEach(dateStr => {
                    const d = new Date(dateStr);
                    if(d.getMonth() === currentMonth && d.getFullYear() === currentYear) {
                        monthlyCount++;
                    }
                });

                alert(`إحصائيات الشهر الحالي:\nلقد أكملت ${monthlyCount} تحديات! استمر في التقدم 🚀`);
            });
        }

        // Admin logic
        if(userId == ADMIN_ID) {
            const abtn = document.createElement('button');
            abtn.innerHTML = "⚙️";
            abtn.style = "position:fixed; top:15px; left:15px; background:none; border:none; color:white; font-size:1.5rem;";
            abtn.onclick = () => document.getElementById('adminPanel').style.display='block';
            document.body.appendChild(abtn);
        }

        function closeAdmin() { document.getElementById('adminPanel').style.display='none'; }

        function addNewChallenge() {
            const ar = document.getElementById('taskAr').value;
            const en = document.getElementById('taskEn').value;
            if(ar && en) {
                db.ref('rq_challenges').push({ar, en});
                alert("تمت الإضافة بنجاح!");
                closeAdmin();
            }
        }

        loadDaily();
        tg.expand();
    </script>
</body>
</html>
