<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Random Quest - Master Edition 👑</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        /* استيراد الخطوط الفخمة */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Tajawal:wght@700&display=swap');
        
        :root {
            --neon-green: #39ff14;
            --neon-blue: #00ffff;
            --pink: #ff75c3;
            --bg-dark: #050510;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --border-glow: 0 0 15px rgba(57, 255, 20, 0.4);
            --shadow-neon: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        /* تنسيق الجسم الأساسي - ملأ الشاشة 100% */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body {
            font-family: 'Montserrat', 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-dark);
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            user-select: none;
        }

        /* الهيدر - شعار اللعبة المتحرك */
        .header-container {
            width: 100%;
            padding-top: env(safe-area-inset-top);
            margin-top: 20px;
            text-align: center;
            position: relative;
        }

        .brand-logo {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
            background: linear-gradient(45deg, var(--neon-green), var(--neon-blue), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--neon-green));
            animation: colorShift 4s linear infinite;
        }

        @keyframes colorShift {
            0% { filter: hue-rotate(0deg) drop-shadow(0 0 15px var(--neon-green)); }
            50% { filter: hue-rotate(180deg) drop-shadow(0 0 15px var(--neon-blue)); }
            100% { filter: hue-rotate(360deg) drop-shadow(0 0 15px var(--neon-green)); }
        }

        /* أزرار التحكم العلوية */
        .top-nav {
            position: absolute;
            top: 20px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            z-index: 1000;
        }

        .nav-btn {
            background: var(--glass-bg);
            border: 1px solid rgba(57, 255, 20, 0.4);
            color: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            backdrop-filter: blur(15px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: var(--border-glow);
            cursor: pointer;
        }

        .nav-btn:active {
            transform: scale(0.8) rotate(15deg);
        }

        /* منطقة الألعاب الرئيسية */
        #mainGameArea {
            display: none;
            width: 95%;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        .game-selector {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        #displayScreen {
            background: rgba(0, 0, 0, 0.9);
            border: 2.5px solid var(--neon-green);
            border-radius: 35px;
            height: 320px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(57, 255, 20, 0.15), 0 0 30px rgba(0,0,0,0.8);
        }

        /* Pepe Custom Character - رسم الضفدع */
        #pepePlayer {
            width: 45px;
            height: 45px;
            position: absolute;
            bottom: 15px;
            left: 50px;
            z-index: 100;
            background: #4CAF50;
            border-radius: 50% 50% 35% 35%;
            border: 2px solid #1B5E20;
            transition: bottom 0.2s cubic-bezier(0.1, 0.5, 0.1, 1);
            filter: drop-shadow(0 0 8px var(--neon-green));
        }

        #pepePlayer::before, #pepePlayer::after {
            content: '';
            position: absolute;
            top: -6px;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            border: 1px solid #000;
        }

        #pepePlayer::before { left: 4px; }
        #pepePlayer::after { right: 4px; }

        .pepe-eye-pupil {
            position: absolute;
            top: 2px;
            left: 4px;
            width: 5px;
            height: 5px;
            background: black;
            border-radius: 50%;
        }

        .obstacle-unit {
            position: absolute;
            bottom: 15px;
            right: -60px;
            width: 35px;
            height: 35px;
            font-size: 1.8rem;
            z-index: 90;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .score-display {
            position: absolute;
            top: 20px;
            left: 25px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
        }

        /* الذاكرة - Memory Game */
        .mem-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 15px;
            height: 100%;
        }

        .card-unit {
            background: #0a0a1a;
            border: 1.5px solid var(--neon-blue);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            transition: transform 0.4s, border-color 0.4s;
        }

        .card-unit.is-flipped {
            border-color: var(--neon-green);
            transform: rotateY(180deg);
        }

        /* منطقة التحدي اليومي */
        #questSectionArea {
            display: none;
            width: 88%;
            text-align: center;
        }

        .quest-box-ui {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid var(--neon-green);
            padding: 35px 25px;
            border-radius: 40px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
            position: relative;
        }

        .quest-label {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--neon-green);
            color: black;
            padding: 5px 20px;
            font-size: 0.8rem;
            font-weight: 900;
            border-radius: 15px;
            box-shadow: 0 0 15px var(--neon-green);
        }

        .btn-confirm {
            background: var(--neon-green);
            color: black;
            padding: 15px 30px;
            border-radius: 15px;
            font-weight: 900;
            border: none;
            width: 100%;
            margin-top: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-green);
        }

        /* شريط التقدم السفلي */
        .footer-progress {
            width: 90%;
            padding-bottom: 40px;
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .level-tag { font-size: 0.85rem; color: white; opacity: 0.9; }
        .streak-tag { font-size: 0.85rem; color: var(--pink); font-weight: bold; }

        .progress-track {
            height: 14px;
            background: rgba(255,255,255,0.05);
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        .progress-fill-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-green), var(--neon-blue));
            width: 0%;
            transition: width 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 0 15px var(--neon-green);
        }

        #timerCountdown {
            text-align: center;
            font-size: 0.8rem;
            margin-top: 15px;
            color: var(--neon-green);
            letter-spacing: 1px;
            font-weight: bold;
        }

        /* لوحة الإدارة الكاملة */
        .admin-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 10000;
            padding: 30px;
            overflow-y: auto;
            text-align: right;
        }

        .admin-section-card {
            background: #0a0a1a;
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #1f1f3a;
        }

        .admin-input-field {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            border-radius: 12px;
            margin: 10px 0;
            font-family: 'Tajawal', sans-serif;
        }

        .user-data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #111;
        }

        .btn-reset-level {
            background: #ff75c3;
            color: black;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body onclick="executeJumpAction()">

    <div class="top-nav">
        <button id="btnSettings" class="nav-btn" onclick="document.getElementById('fileInputBG').click(); event.stopPropagation();" style="display:none;">🖼️</button>
        <button id="btnAdmin" class="nav-btn" onclick="toggleAdminPanel(true); event.stopPropagation();" style="display:none;">⚙️</button>
    </div>
    <input type="file" id="fileInputBG" hidden onchange="handleBackgroundUpload(this)">

    <div class="header-container">
        <div class="brand-logo">Random Quest</div>
    </div>

    <div id="questSectionArea">
        <div class="quest-box-ui">
            <div class="quest-label">مهمة اليوم</div>
            <h2 id="arabicTaskTitle" style="margin: 0; font-size: 1.8rem; color: var(--neon-green);">...</h2>
            <p id="englishTaskTitle" style="opacity: 0.4; font-size: 0.9rem; margin-top: 15px;">Challenge Loading</p>
            <button class="btn-confirm" onclick="finalizeQuest()">تم التنفيذ ✅</button>
        </div>
    </div>

    <div id="mainGameArea">
        <div class="game-selector">
            <button class="nav-btn" onclick="launchMemory(); event.stopPropagation();">🧠</button>
            <button class="nav-btn" onclick="launchPepe(); event.stopPropagation();">🐸</button>
            <button class="nav-btn" onclick="launchBubbles(); event.stopPropagation();">🫧</button>
        </div>
        <div id="displayScreen"></div>
        <div id="topScoreNotice" style="text-align: center; font-size: 0.75rem; color: var(--neon-blue); margin-top: 10px; font-weight: bold;"></div>
    </div>

    <div class="footer-progress">
        <div class="progress-labels">
            <span id="labelLevel" class="level-tag">المستوى: 0 / 30</span>
            <span id="labelStreak" class="streak-tag">🔥 0 يوم</span>
        </div>
        <div class="progress-track">
            <div id="innerProgressFill" class="progress-fill-bar"></div>
        </div>
        <div id="timerCountdown"></div>
    </div>

    <div id="adminPanelOverlay" class="admin-overlay">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h1 style="color: var(--neon-green); margin:0; font-size: 2rem;">إدارة زينب 👑</h1>
            <button onclick="toggleAdminPanel(false)" style="background:none; border:none; color:white; font-size:3rem;">&times;</button>
        </div>

        <div class="admin-section-card">
            <h3 style="margin:0 0 15px 0;">➕ إضافة تحدي جديد للقاعدة</h3>
            <input type="text" id="inputAr" class="admin-input-field" placeholder="نص التحدي بالعربية">
            <input type="text" id="inputEn" class="admin-input-field" placeholder="Challenge in English">
            <button class="btn-confirm" onclick="pushNewTaskToDB()">حفظ في Firebase</button>
        </div>

        <div class="admin-section-card">
            <h3 style="margin:0 0 15px 0;">👥 مراقبة وتصفير المستخدمين</h3>
            <div id="adminUserListContainer"></div>
        </div>

        <div class="admin-section-card">
            <h3 style="margin:0 0 15px 0;">📜 قائمة التحديات الحالية</h3>
            <div id="adminTaskListContainer"></div>
        </div>
    </div>

    <script>
        /* -----------------------------------------------------------
           1. الإعدادات والمتغيرات الأساسية
        ----------------------------------------------------------- */
        const FIREBASE_DATABASE_URL = "https://randomquest-app-default-rtdb.firebaseio.com/";
        const telegramApp = window.Telegram.WebApp;
        const ZAINAB_ID = 8421694319;
        const currentUser = telegramApp.initDataUnsafe.user || { id: ZAINAB_ID, first_name: "زينب" };

        firebase.initializeApp({ databaseURL: FIREBASE_DATABASE_URL });
        const database = firebase.database();
        
        let currentActiveGame = "";
        let runningIntervals = [];

        // تفعيل أزرار الأدمن لزينب فقط
        if (currentUser.id == ZAINAB_ID) {
            document.getElementById('btnSettings').style.display = 'flex';
            document.getElementById('btnAdmin').style.display = 'flex';
        }

        /* -----------------------------------------------------------
           2. دوال تنظيف وإدارة اللعب
        ----------------------------------------------------------- */
        function terminateAllLoops() {
            currentActiveGame = "";
            runningIntervals.forEach(interval => clearInterval(interval));
            runningIntervals = [];
            document.getElementById('displayScreen').innerHTML = "";
        }

        /* -----------------------------------------------------------
           3. لعبة بيبي المطور (Pepe Game)
        ----------------------------------------------------------- */
        function launchPepe() {
            terminateAllLoops();
            currentActiveGame = "pepe";
            const screen = document.getElementById('displayScreen');
            
            // إنشاء هيكل اللعبة
            screen.innerHTML = `
                <div class="score-display" id="pepeScoreBoard">0</div>
                <div id="pepePlayer">
                    <div class="pepe-eye-pupil" style="left: 4px;"></div>
                    <div class="pepe-eye-pupil" style="right: 4px; left: auto;"></div>
                </div>
            `;
            
            let gameScore = 0;

            function createObstacle() {
                if (currentActiveGame !== "pepe") return;

                const obstacle = document.createElement('div');
                obstacle.className = 'obstacle-unit';
                obstacle.innerHTML = "🌵";
                screen.appendChild(obstacle);

                let obstaclePosition = -60;
                let movementLoop = setInterval(() => {
                    obstaclePosition += 6.5; // سرعة متزنة
                    obstacle.style.right = obstaclePosition + "px";

                    const pepe = document.getElementById('pepePlayer');
                    const pepeTop = pepe.offsetTop;

                    // منطق الاصطدام الدقيق
                    if (obstaclePosition > (screen.offsetWidth - 90) && 
                        obstaclePosition < (screen.offsetWidth - 40) && 
                        pepeTop > 200) {
                        
                        clearInterval(movementLoop);
                        alert("للأسف خسرنا! السكور تاعك هو: " + gameScore);
                        updateHighScoreInDB(gameScore);
                        launchPepe(); // إعادة تشغيل
                    }

                    // تجاوز العائق بنجاح
                    if (obstaclePosition > screen.offsetWidth) {
                        clearInterval(movementLoop);
                        obstacle.remove();
                        gameScore++;
                        document.getElementById('pepeScoreBoard').innerText = gameScore;
                    }
                }, 20);

                runningIntervals.push(movementLoop);
                
                // تباعد ذكي بين العوائق لمنع التراكم
                let nextSpawnTime = Math.random() * 1200 + 1500;
                setTimeout(createObstacle, nextSpawnTime);
            }

            createObstacle();
            fetchGlobalHighScore();
        }

        function executeJumpAction() {
            if (currentActiveGame === "pepe") {
                const player = document.getElementById('pepePlayer');
                if (player.style.bottom === "115px") return;
                
                player.style.bottom = "115px";
                setTimeout(() => {
                    player.style.bottom = "15px";
                }, 350);
            }
        }

        /* -----------------------------------------------------------
           4. لعبة الذاكرة (Memory Grid)
        ----------------------------------------------------------- */
        function launchMemory() {
            terminateAllLoops();
            const screen = document.getElementById('displayScreen');
            const grid = document.createElement('div');
            grid.className = 'mem-container';
            
            const emojis = ['⚖️','📚','💻','💎','🔥','🚀','🌙','👾'];
            const gameDeck = [...emojis, ...emojis].sort(() => Math.random() - 0.5);
            let selectedCards = [];

            gameDeck.forEach(emoji => {
                const card = document.createElement('div');
                card.className = 'card-unit';
                
                card.onclick = (event) => {
                    event.stopPropagation();
                    if (selectedCards.length < 2 && !card.innerText) {
                        card.innerText = emoji;
                        card.classList.add('is-flipped');
                        selectedCards.push(card);

                        if (selectedCards.length === 2) {
                            if (selectedCards[0].innerText === selectedCards[1].innerText) {
                                selectedCards = []; // تطابق صحيح
                            } else {
                                setTimeout(() => {
                                    selectedCards.forEach(c => {
                                        c.innerText = "";
                                        c.classList.remove('is-flipped');
                                    });
                                    selectedCards = [];
                                }, 600);
                            }
                        }
                    }
                };
                grid.appendChild(card);
            });
            screen.appendChild(grid);
        }

        /* -----------------------------------------------------------
           5. لعبة الفقاعات (Bubble Pop)
        ----------------------------------------------------------- */
        function launchBubbles() {
            terminateAllLoops();
            const screen = document.getElementById('displayScreen');
            
            let bubbleSpawner = setInterval(() => {
                const bubble = document.createElement('div');
                bubble.innerHTML = "🫧";
                bubble.style.position = "absolute";
                bubble.style.left = Math.random() * 80 + 5 + "%";
                bubble.style.top = Math.random() * 80 + 5 + "%";
                bubble.style.fontSize = "2.5rem";
                bubble.style.cursor = "pointer";
                bubble.style.filter = "drop-shadow(0 0 10px var(--neon-blue))";
                
                bubble.onclick = (e) => {
                    e.stopPropagation();
                    bubble.remove();
                };
                
                screen.appendChild(bubble);
                setTimeout(() => { if(bubble) bubble.remove(); }, 1500);
            }, 800);
            
            runningIntervals.push(bubbleSpawner);
        }

        /* -----------------------------------------------------------
           6. دوال التزامن مع Firebase
        ----------------------------------------------------------- */
        async function updateHighScoreInDB(val) {
            const scorePath = database.ref(`rq_scores/${currentUser.id}`);
            const currentData = await scorePath.once('value');
            if (val > (currentData.val()?.score || 0)) {
                await scorePath.set({ name: currentUser.first_name, score: val });
            }
        }

        async function fetchGlobalHighScore() {
            const topScoreRef = database.ref('rq_scores').orderByChild('score').limitToLast(1);
            topScoreRef.on('value', snap => {
                snap.forEach(child => {
                    document.getElementById('topScoreNotice').innerText = 
                        `المتصدر حالياً: ${child.val().name} بـ ${child.val().score} نقطة`;
                });
            });
        }

        /* -----------------------------------------------------------
           7. نظام الإدارة (Admin Logic)
        ----------------------------------------------------------- */
        function toggleAdminPanel(show) {
            const panel = document.getElementById('adminPanelOverlay');
            panel.style.display = show ? 'block' : 'none';
            if(show) refreshAdminData();
        }

        function refreshAdminData() {
            // جلب المستخدمين
            database.ref('rq_users').on('value', snap => {
                const container = document.getElementById('adminUserListContainer');
                container.innerHTML = "";
                snap.forEach(userNode => {
                    const data = userNode.val();
                    const progress = data.history ? Object.keys(data.history).length : 0;
                    container.innerHTML += `
                        <div class="user-data-row">
                            <span>${data.info?.name || 'مجهول'} (المستوى: ${progress})</span>
                            <span class="btn-reset-level" onclick="resetUserProgress('${userNode.key}')">تصفير</span>
                        </div>
                    `;
                });
            });

            // جلب التحديات
            database.ref('rq_challenges').on('value', snap => {
                const container = document.getElementById('adminTaskListContainer');
                container.innerHTML = "";
                snap.forEach(taskNode => {
                    container.innerHTML += `
                        <div class="user-data-row">
                            <span>${taskNode.val().ar}</span>
                            <button onclick="removeTaskFromDB('${taskNode.key}')" style="background:none; border:none; color:red;">حذف</button>
                        </div>
                    `;
                });
            });
        }

        async function pushNewTaskToDB() {
            const arText = document.getElementById('inputAr').value;
            const enText = document.getElementById('inputEn').value;
            if (arText) {
                await database.ref('rq_challenges').push({ ar: arText, en: enText || "..." });
                document.getElementById('inputAr').value = "";
                document.getElementById('inputEn').value = "";
            }
        }

        async function removeTaskFromDB(id) {
            if(confirm("هل تريدين حذف هذا التحدي نهائياً؟")) {
                await database.ref(`rq_challenges/${id}`).remove();
            }
        }

        async function resetUserProgress(uid) {
            if(confirm("سيتم مسح كل مستويات هذا الشخص، هل أنتِ متأكدة؟")) {
                await database.ref(`rq_users/${uid}/history`).remove();
            }
        }

        /* -----------------------------------------------------------
           8. تهيئة التطبيق (App Startup)
        ----------------------------------------------------------- */
        function handleBackgroundUpload(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.body.style.backgroundImage = `url(${e.target.result})`;
                localStorage.setItem('custom_bg_path', e.target.result);
            };
            reader.readAsDataURL(input.files[0]);
        }

        if(localStorage.getItem('custom_bg_path')) {
            document.body.style.backgroundImage = `url(${localStorage.getItem('custom_bg_path')})`;
        }

        async function startAppLogic() {
            const dateStr = new Date().toISOString().split('T')[0];
            const userPath = database.ref(`rq_users/${currentUser.id}`);
            const snapshot = await userPath.once('value');
            
            const history = snapshot.val()?.history || {};
            const levelCount = Object.keys(history).length;

            // تحديث الشريط
            document.getElementById('innerProgressFill').style.width = (Math.min(levelCount, 30) / 30 * 100) + "%";
            document.getElementById('labelLevel').innerText = `المستوى: ${levelCount} / 30`;

            if (history[dateStr]) {
                // المهمة مكتملة
                document.getElementById('mainGameArea').style.display = 'flex';
                document.getElementById('questSectionArea').style.display = 'none';
                initTimer(history[dateStr].time);
                launchPepe();
            } else {
                // جلب مهمة عشوائية
                const tasksSnap = await database.ref('rq_challenges').once('value');
                let taskPool = [];
                tasksSnap.forEach(t => taskPool.push(t.val()));
                
                const selected = taskPool[Math.floor(Math.random() * taskPool.length)] || { ar: "قم بـ 20 تمرينة ضغط!", en: "Do 20 Pushups" };
                document.getElementById('arabicTaskTitle').innerText = selected.ar;
                document.getElementById('englishTaskTitle').innerText = selected.en;
                document.getElementById('questSectionArea').style.display = 'block';
            }
        }

        async function finalizeQuest() {
            const dateStr = new Date().toISOString().split('T')[0];
            const timestamp = Date.now();
            
            await database.ref(`rq_users/${currentUser.id}/history/${dateStr}`).set({ done: true, time: timestamp });
            await database.ref(`rq_users/${currentUser.id}/info`).update({ name: currentUser.first_name, last_login: timestamp });
            
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            setTimeout(() => { location.reload(); }, 1500);
        }

        function initTimer(doneTime) {
            setInterval(() => {
                const diff = (doneTime + 86400000) - Date.now();
                if (diff <= 0) location.reload();
                
                const h = Math.floor(diff/3600000).toString().padStart(2,'0');
                const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                document.getElementById('timerCountdown').innerText = `التحدي القادم بعد: ${h}:${m}:${s}`;
            }, 1000);
        }

        // تشغيل التطبيق
        startAppLogic();

    </script>
</body>
</html>
