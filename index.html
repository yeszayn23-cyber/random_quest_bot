<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RQ-V2 🚀</title>
    <script src="https://telegram.org/js/telegram-web-app.js?id=random123"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Amiri:wght@700&display=swap');
        :root { --p: #a18cd1; --a: #ff9f43; --bg: #050505; }
        body { font-family: 'Amiri', serif; background: var(--bg); color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center; }
        .card { background: rgba(255,255,255,0.05); border: 2px solid var(--p); padding: 30px; border-radius: 25px; width: 80%; backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(161,140,209,0.2); }
        #task { font-size: 1.8rem; margin-bottom: 10px; color: #fff; }
        #taskEn { font-family: 'Caveat', cursive; font-size: 1.4rem; color: var(--a); }
        .btn-main { background: var(--a); color: #000; border: none; padding: 18px 45px; border-radius: 50px; font-size: 1.5rem; font-weight: bold; margin-top: 30px; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(255,159,67,0.4); }
        .btn-main:active { transform: scale(0.95); }
        #adminBtn { position: fixed; bottom: 20px; right: 20px; background: none; border: 1px solid #444; color: #444; border-radius: 50%; width: 40px; height: 40px; }
    </style>
</head>
<body>

    <div class="card">
        <div id="task">تحدي اليوم...</div>
        <div id="taskEn">Daily Quest...</div>
    </div>

    <button id="mainBtn" class="btn-main" onclick="finish()">تم الإنجاز ✅</button>

    <script>
        // التوكن الجديد اللي عطيتيهولي
        const MY_TOKEN = "8066162864:AAEcmBdXICIK6Sa4mD_91TjECBvnUCOrI48";
        const MY_ADMIN = 8421694319;

        const webApp = window.Telegram.WebApp;
        webApp.expand();
        const uId = webApp.initDataUnsafe.user?.id || 123;

        // ربط فايربيس
        firebase.initializeApp({ databaseURL: "https://randomquest-app-default-rtdb.firebaseio.com/" });
        const rdb = firebase.database();

        async function getQuest() {
            const snap = await rdb.ref('rq_challenges').once('value');
            const data = snap.val();
            if (data) {
                const keys = Object.keys(data);
                const rand = keys[Math.floor(Math.random() * keys.length)];
                document.getElementById('task').innerText = data[rand].ar;
                document.getElementById('taskEn').innerText = data[rand].en;
                window.currentQ = data[rand].ar;
            }
        }

        function finish() {
            confetti({ particleCount: 100, spread: 70 });
            document.getElementById('mainBtn').disabled = true;
            document.getElementById('mainBtn').innerText = "بطل! 🔥";
            
            // إرسال الرسالة بالتوكن الجديد
            fetch(`https://api.telegram.org/bot${MY_TOKEN}/sendMessage?chat_id=${uId}&text=🏆 كفو! خلصت تحدي: ${window.currentQ || 'تحدي اليوم'}`);
        }

        getQuest();

        if(uId == MY_ADMIN) {
            let a = document.createElement('button');
            a.id = "adminBtn"; a.innerText = "⚙️";
            a.onclick = () => alert("لوحة الإدارة قيد التحديث...");
            document.body.appendChild(a);
        }
    </script>
</body>
</html>
