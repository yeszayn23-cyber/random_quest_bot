<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Random Quest 🚀</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Amiri+Quran&family=Caveat:wght@700&display=swap');
        :root { --gold: #ffcf4d; --pink: #ff75c3; --glass: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Montserrat', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; background: #050518 no-repeat center center/cover; color: white; overflow: hidden; text-align: center; transition: 0.5s; }
        .brand-name { margin-top: 25px; font-size: 2.5rem; font-weight: 900; background: linear-gradient(45deg, var(--gold), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }
        .top-controls { position: absolute; top: 15px; width: 90%; display: flex; justify-content: space-between; z-index: 100; }
        .icon-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; border: none; }
        .challenge-card { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); padding: 20px; border-radius: 30px; width: 85%; margin-top: 30px; min-height: 120px; display: flex; flex-direction: column; justify-content: center; }
        .progress-container { width: 85%; margin-top: 20px; text-align: center; }
        .progress-bar { height: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 8px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), #ff8c00); width: 0%; transition: 1.5s; }
        .btn-main { background: linear-gradient(135deg, var(--gold), #ff8c00); color: black; border: none; padding: 15px 60px; border-radius: 50px; font-size: 1.5rem; font-family: 'Caveat', cursive; font-weight: bold; margin-top: 30px; cursor: pointer; }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; text-align: right; }
        .admin-sec { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        
        #gameSection { display: none; width: 85%; margin-top: 20px; animation: fadeIn 0.5s; }
        #activeGameContainer { background: rgba(255,255,255,0.05); border-radius: 20px; min-height: 200px; position: relative; overflow: hidden; border: 1px solid var(--glass); display: flex; align-items: center; justify-content: center; }
        .score-info { margin-top: 10px; font-size: 0.8rem; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 12px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body id="mainBody">

    <div class="top-controls">
        <button id="bgBtn" class="icon-btn" onclick="document.getElementById('bgInput').click()" style="display:none;">🖼️</button>
        <button id="adminBtn" class="icon-btn" onclick="openAdmin()" style="display:none;">⚙️</button>
    </div>
    <input type="file" id="bgInput" hidden accept="image/*" onchange="uploadBG(this)">

    <div class="brand-name">Random Quest</div>

    <div id="questUI" style="display:none;">
        <div class="challenge-card">
            <div id="dailyTask" style="font-size: 1.5rem; font-weight: 800; line-height: 1.3;">جاري التحميل...</div>
            <div id="dailyTaskEn" style="font-size: 0.9rem; opacity: 0.4; margin-top: 10px; font-style: italic;">...</div>
        </div>
        <button id="doneBtn" class="btn-main" onclick="handleDone()">FIT / تم ✅</button>
    </div>

    <div id="gameSection">
        <h3 style="color:var(--gold); font-family: 'Caveat', cursive; font-size: 1.3rem;">ألعاب الانتظار 🎮</h3>
        <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 10px;">
            <button class="icon-btn" onclick="initMemoryGame()">🧠</button>
            <button class="icon-btn" onclick="initXOGame()">❌</button>
            <button class="icon-btn" onclick="initBubbleGame()">🫧</button>
        </div>
        <div id="activeGameContainer"></div>
        <div class="score-info">
            <div id="personalBest">أعلى سكور لكِ: 0</div>
            <div id="globalLeader" style="color:var(--gold); font-weight:bold; margin-top:4px;">المتصدر: جاري التحميل...</div>
        </div>
    </div>

    <div class="progress-container">
        <span id="progressText" style="font-size: 0.85rem; color: var(--gold);">إنجازك: 0 / 30 🔥</span>
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
    </div>

    <div id="statusArea" style="display:none; margin-top: 15px;">
        <div id="nextQuestTimer" style="font-family: monospace; color: var(--pink); font-weight: bold;">00:00:00</div>
    </div>

    <div id="adminPanel" class="modal">
        <button onclick="closeAdmin()" style="color:#ff4757; background:none; border:none; font-size:1.5rem; float:left;">×</button>
        <h2 style="color:var(--gold); text-align:center;">لوحة الإدارة 🛠</h2>
        <div class="admin-sec" id="userStatsList"></div>
    </div>

    <script>
        const FIREBASE_URL = "https://randomquest-app-default-rtdb.firebaseio.com/";
        const tg = window.Telegram.WebApp;
        const MY_ID = 8421694319; // الأيدي الخاص بكِ للتحكم
        const userId = tg.initDataUnsafe.user?.id || 8421694319;
        const userName = tg.initDataUnsafe.user?.first_name || "لاعب مجهول";
        
        let timerInterval, activeGame = "", currentScore = 0;
        let isSaving = false;

        firebase.initializeApp({ databaseURL: FIREBASE_URL });
        const db = firebase.database();

        // إظهار أزرار التحكم لكِ فقط
        if(userId == MY_ID) {
            document.getElementById('bgBtn').style.display = 'flex';
            document.getElementById('adminBtn').style.display = 'flex';
        }

        function uploadBG(input) {
            if(userId != MY_ID) return;
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => { document.body.style.backgroundImage = `url(${e.target.result})`; localStorage.setItem('userBG', e.target.result); };
            reader.readAsDataURL(file);
        }
        if(localStorage.getItem('userBG')) document.body.style.backgroundImage = `url(${localStorage.getItem('userBG')})`;

        async function loadApp() {
            clearInterval(timerInterval);
            const today = new Date().toISOString().split('T')[0]; // مفتاح اليوم YYYY-MM-DD
            
            const snapTasks = await db.ref('rq_challenges').once('value');
            const snapUser = await db.ref(`rq_users/${userId}`).once('value');
            const userData = snapUser.val() || {};
            const history = userData.history || {};
            
            // تحديث شريط التقدم
            const completedCount = Object.keys(history).length;
            document.getElementById('progressFill').style.width = (Math.min(completedCount, 30) / 30 * 100) + "%";
            document.getElementById('progressText').innerText = `إنجازك: ${completedCount} / 30 🔥`;

            // التحقق من تاريخ اليوم في الهيستوري لمنع التكرار
            if (history[today]) {
                showDoneUI(history[today].doneTime);
                return;
            }

            // إذا لم ينجز تحدي اليوم
            let allTasks = []; snapTasks.forEach(t => allTasks.push({...t.val(), key: t.key}));
            const doneArs = Object.values(history).map(h => h.taskAr);
            let available = allTasks.filter(t => !doneArs.includes(t.ar));
            if(available.length === 0) available = allTasks;

            const chosen = available[Math.floor(Math.random() * available.length)];
            document.getElementById('dailyTask').innerText = chosen.ar;
            document.getElementById('dailyTaskEn').innerText = chosen.en;
            window.currentTaskAr = chosen.ar;
            
            document.getElementById('questUI').style.display = 'block';
            document.getElementById('gameSection').style.display = 'none';
            document.getElementById('statusArea').style.display = 'none';
        }

        async function handleDone() {
            if(isSaving) return;
            isSaving = true;
            const now = Date.now();
            const today = new Date().toISOString().split('T')[0];
            
            document.getElementById('doneBtn').disabled = true;
            document.getElementById('doneBtn').innerText = "جاري الحفظ...";

            confetti({ particleCount: 150, spread: 70 });

            // الحفظ باستخدام تاريخ اليوم كمفتاح لضمان عدم التكرار نهائياً
            await db.ref(`rq_users/${userId}/history/${today}`).set({
                done: true,
                taskAr: window.currentTaskAr,
                doneTime: now
            });

            await db.ref(`rq_users/${userId}/info`).update({
                name: userName,
                lastSeen: now
            });

            isSaving = false;
            showDoneUI(now);
        }

        function showDoneUI(doneTime) {
            document.getElementById('questUI').style.display = 'none';
            document.getElementById('gameSection').style.display = 'block';
            document.getElementById('statusArea').style.display = 'block';
            updateTimer(doneTime);
            timerInterval = setInterval(() => updateTimer(doneTime), 1000);
        }

        function updateTimer(doneTime) {
            const diff = (doneTime + 86400000) - Date.now();
            if (diff <= 0) { clearInterval(timerInterval); loadApp(); return; }
            const h = Math.floor(diff / 36e5).toString().padStart(2, '0');
            const m = Math.floor((diff % 36e5) / 6e4).toString().padStart(2, '0');
            const s = Math.floor((diff % 6e4) / 1000).toString().padStart(2, '0');
            document.getElementById('nextQuestTimer').innerText = `التحدي القادم خلال: ${h}:${m}:${s}`;
        }

        async function syncScore(game, score) {
            activeGame = game;
            const ref = db.ref(`rq_leaderboards/${game}`);
            const userRef = ref.child(userId);
            const snap = await userRef.once('value');
            if (score > (snap.val()?.score || 0)) {
                await userRef.set({ name: userName, score: score });
            }
            ref.orderByChild('score').limitToLast(1).on('value', s => {
                s.forEach(child => {
                    document.getElementById('globalLeader').innerText = `المتصدر في ${game}: ${child.val().name} (${child.val().score})`;
                });
            });
            userRef.on('value', s => { document.getElementById('personalBest').innerText = `أعلى سكور لكِ في ${game}: ${s.val()?.score || 0}`; });
        }

        // --- ألعاب الانتظار ---
        function initMemoryGame() {
            currentScore = 0; syncScore("الذاكرة", 0);
            const container = document.getElementById('activeGameContainer');
            const icons = ['💎','👑','🌟','🌙','💎','👑','🌟','🌙'].sort(() => Math.random()-0.5);
            container.innerHTML = `<div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 8px;"></div>`;
            let flipped = [];
            icons.forEach(icon => {
                const card = document.createElement('div');
                card.style = "width:40px; height:40px; background:var(--glass); display:flex; align-items:center; justify-content:center; font-size:1.2rem; border-radius:8px; cursor:pointer;";
                card.onclick = function() {
                    if (flipped.length < 2 && !this.innerText) {
                        this.innerText = icon; flipped.push(this);
                        if (flipped.length === 2) {
                            if (flipped[0].innerText === flipped[1].innerText) { currentScore += 10; syncScore("الذاكرة", currentScore); flipped = []; }
                            else setTimeout(() => { flipped.forEach(c => c.innerText = ''); flipped = []; }, 500);
                        }
                    }
                };
                container.firstChild.appendChild(card);
            });
        }

        function initXOGame() {
            syncScore("XO", 0);
            const container = document.getElementById('activeGameContainer');
            container.innerHTML = `<div style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 5px;"></div>`;
            let board = ["","","","","","","","",""];
            for(let i=0; i<9; i++) {
                const cell = document.createElement('div');
                cell.style = "width:50px; height:50px; background:var(--glass); display:flex; align-items:center; justify-content:center; font-size:1.2rem; border-radius:8px; cursor:pointer;";
                cell.onclick = function() {
                    if(!board[i]) {
                        board[i] = "X"; this.innerText = "❌";
                        let empty = board.map((v, idx) => v === "" ? idx : null).filter(v => v !== null);
                        if(empty.length > 0) {
                            let m = empty[Math.floor(Math.random()*empty.length)];
                            board[m] = "O"; container.firstChild.children[m].innerText = "⭕";
                        }
                    }
                };
                container.firstChild.appendChild(cell);
            }
        }

        function initBubbleGame() {
            currentScore = 0; syncScore("الفقاعات", 0);
            const container = document.getElementById('activeGameContainer'); container.innerHTML = "";
            const interval = setInterval(() => {
                if(activeGame !== "الفقاعات" || document.getElementById('gameSection').style.display === 'none') return clearInterval(interval);
                const b = document.createElement('div');
                const size = Math.random()*25+15;
                b.style = `position:absolute; width:${size}px; height:${size}px; background:var(--pink); border-radius:50%; left:${Math.random()*85}%; top:${Math.random()*85}%; opacity:0.6; cursor:pointer; transition:0.3s;`;
                b.onclick = function() { currentScore++; syncScore("الفقاعات", currentScore); this.remove(); };
                container.appendChild(b);
                setTimeout(() => { if(b.parentNode) b.remove(); }, 2000);
            }, 700);
        }

        function openAdmin() { if(userId == MY_ID) document.getElementById('adminPanel').style.display = 'block'; }
        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }
        
        loadApp();
    </script>
</body>
</html>
