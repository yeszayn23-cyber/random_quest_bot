<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Random Quest - Ultimate Edition 🚀</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Caveat:wght@700&display=swap');
        :root { --neon-green: #39ff14; --neon-blue: #00ffff; --pink: #ff75c3; --bg-dark: #050510; --glass: rgba(255, 255, 255, 0.05); }
        
        body { font-family: 'Montserrat', sans-serif; margin: 0; height: 100vh; background: var(--bg-dark) no-repeat center center/cover; color: white; overflow: hidden; display: flex; flex-direction: column; align-items: center; transition: background 0.5s ease; }
        
        /* Header & Brand */
        .brand-name { margin-top: 25px; font-size: 2.5rem; font-weight: 900; background: linear-gradient(45deg, var(--neon-green), var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px var(--neon-green)); letter-spacing: -1px; }
        
        .top-controls { position: absolute; top: 20px; width: 92%; display: flex; justify-content: space-between; z-index: 2000; }
        .icon-btn { background: var(--glass); border: 1px solid rgba(57, 255, 20, 0.3); color: white; border-radius: 50%; width: 48px; height: 48px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; transition: 0.3s; backdrop-filter: blur(5px); }
        .icon-btn:active { transform: scale(0.9); border-color: var(--neon-green); }

        /* Quest UI */
        .challenge-card { background: rgba(0, 0, 0, 0.8); border: 2px solid var(--neon-green); padding: 25px; border-radius: 30px; width: 85%; margin-top: 30px; box-shadow: 0 0 30px rgba(57, 255, 20, 0.15); text-align: center; position: relative; overflow: hidden; }
        #dailyTask { font-size: 1.5rem; font-weight: 800; line-height: 1.4; }
        #dailyTaskEn { font-size: 0.85rem; opacity: 0.5; margin-top: 10px; font-family: sans-serif; }
        .btn-main { background: linear-gradient(135deg, var(--neon-green), var(--neon-blue)); color: black; border: none; padding: 15px 50px; border-radius: 50px; font-size: 1.3rem; font-weight: bold; margin-top: 25px; cursor: pointer; box-shadow: 0 5px 15px rgba(57, 255, 20, 0.4); transition: 0.3s; }

        /* Game Section */
        #gameSection { display: none; width: 92%; margin-top: 20px; animation: fadeIn 0.5s; }
        #gameTabs { display: flex; gap: 15px; justify-content: center; margin-bottom: 20px; }
        #activeGameContainer { background: #000; border: 2px solid var(--neon-green); border-radius: 25px; height: 300px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 20px rgba(57, 255, 20, 0.2); }

        /* Pepe Jump Specific */
        #pepe { width: 60px; height: 60px; position: absolute; bottom: 15px; left: 40px; font-size: 3rem; filter: drop-shadow(0 0 15px var(--neon-green)); z-index: 100; transition: bottom 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .obstacle { width: 35px; height: 35px; position: absolute; bottom: 15px; right: -50px; font-size: 1.8rem; filter: drop-shadow(0 0 10px var(--neon-blue)); }
        #liveScore { position: absolute; top: 15px; left: 20px; font-family: 'Courier New', monospace; font-size: 1.5rem; color: var(--neon-green); z-index: 110; }

        /* Memory Grid */
        .mem-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; width: 100%; height: 100%; }
        .card { background: #0a0a15; border: 1px solid var(--neon-blue); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; cursor: pointer; transition: 0.2s; box-shadow: 0 0 10px rgba(0, 255, 255, 0.1); }
        .card.flipped { border-color: var(--neon-green); background: #111; }

        /* Progress Bar */
        .progress-container { width: 85%; margin-top: auto; margin-bottom: 30px; }
        .progress-bar { height: 10px; background: rgba(255,255,255,0.05); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--neon-green), var(--neon-blue)); width: 0%; box-shadow: 0 0 15px var(--neon-green); transition: 1.5s cubic-bezier(0.1, 0.7, 1.0, 0.1); }

        /* Admin Panels */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 5000; padding: 25px; overflow-y: auto; text-align: right; }
        .admin-sec { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #333; }
        input { width: 94%; padding: 12px; margin: 10px 0; border-radius: 12px; background: #000; color: #fff; border: 1px solid #444; font-size: 1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { color: var(--neon-blue); padding: 10px; border-bottom: 2px solid #222; }
        td { padding: 12px; border-bottom: 1px solid #222; text-align: center; font-size: 0.9rem; }
        .reset-btn { background: #ffa500; color: #000; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .del-btn { background: #ff4757; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body onclick="handleGlobalClick()">

    <div class="top-controls">
        <button id="bgBtn" class="icon-btn" onclick="document.getElementById('bgInput').click(); event.stopPropagation();" style="display:none;">🖼️</button>
        <button id="adminBtn" class="icon-btn" onclick="openAdmin(); event.stopPropagation();" style="display:none;">⚙️</button>
    </div>
    <input type="file" id="bgInput" hidden onchange="uploadBG(this)">

    <div class="brand-name">Random Quest</div>

    <div id="questUI" style="display:none;">
        <div class="challenge-card">
            <div id="dailyTask">تحميل المهمة...</div>
            <div id="dailyTaskEn">Fetching daily mission...</div>
            <button class="btn-main" onclick="confirmDone()">DONE / تم ✅</button>
        </div>
    </div>

    <div id="gameSection">
        <div id="gameTabs">
            <button class="icon-btn" onclick="initMemory(); event.stopPropagation();">🧠</button>
            <button class="icon-btn" onclick="initPepe(); event.stopPropagation();">🐸</button>
            <button class="icon-btn" onclick="initBubbles(); event.stopPropagation();">🫧</button>
        </div>
        <div id="activeGameContainer"></div>
        <div id="leaderboardMini" style="margin-top:10px; font-size:0.75rem; text-align:center; color:var(--neon-green);"></div>
    </div>

    <div class="progress-container">
        <div id="progressText" style="font-size: 0.9rem; color: var(--neon-green); margin-bottom: 8px;">إنجازك: 0 / 30 🔥</div>
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        <div id="timerDisplay" style="text-align:center; font-size:0.8rem; color:var(--pink); margin-top:10px; font-weight:bold;"></div>
    </div>

    <div id="adminPanel" class="modal">
        <button onclick="closeAdmin()" style="color:red; float:left; font-size:2.5rem; background:none; border:none; cursor:pointer;">&times;</button>
        <h2 style="text-align:center; color:var(--neon-green); font-family:'Caveat', cursive; font-size:2.5rem;">إدارة زينب ⚖️</h2>
        
        <div class="admin-sec">
            <h3 style="color:var(--neon-blue);">➕ إضافة تحدي جديد</h3>
            <input type="text" id="addAr" placeholder="التحدي بالعربية">
            <input type="text" id="addEn" placeholder="Challenge in English">
            <button class="btn-main" onclick="submitTask()" style="margin-top:10px; padding:10px 30px;">حفظ في القاعدة</button>
        </div>

        <div class="admin-sec">
            <h3 style="color:var(--neon-blue);">📋 التحديات الحالية</h3>
            <div id="tasksList" style="max-height:200px; overflow-y:auto;"></div>
        </div>

        <div class="admin-sec">
            <h3 style="color:var(--neon-blue);">👥 قائمة الزوار والتحكم</h3>
            <table>
                <thead><tr><th>الاسم</th><th>التقدم</th><th>تصفير</th></tr></thead>
                <tbody id="usersList"></tbody>
            </table>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://randomquest-app-default-rtdb.firebaseio.com/";
        const tg = window.Telegram.WebApp;
        const MY_ID = 8421694319;
        const userId = tg.initDataUnsafe.user?.id || 8421694319;
        const userName = tg.initDataUnsafe.user?.first_name || "لاعب";
        
        firebase.initializeApp({ databaseURL: FIREBASE_URL });
        const db = firebase.database();
        let loops = [], gameType = "";

        if(userId == MY_ID) { document.getElementById('bgBtn').style.display='flex'; document.getElementById('adminBtn').style.display='flex'; }

        function clearAll() {
            gameType = "";
            loops.forEach(clearInterval);
            loops = [];
            document.getElementById('activeGameContainer').innerHTML = "";
        }

        // --- Pepe Jump Game ---
        function initPepe() {
            clearAll(); gameType = "pepe";
            const stage = document.getElementById('activeGameContainer');
            stage.innerHTML = `<div id="liveScore">0</div><div id="pepe">🐸</div>`;
            let score = 0;
            
            function spawnObs() {
                if(gameType !== "pepe") return;
                const obs = document.createElement('div');
                obs.className = 'obstacle'; obs.innerHTML = "🌵";
                stage.appendChild(obs);
                let x = -50;
                let move = setInterval(() => {
                    x += 6.5; obs.style.right = x + "px";
                    let pTop = document.getElementById('pepe').offsetTop;
                    if(x > (stage.offsetWidth - 90) && x < (stage.offsetWidth - 40) && pTop > 195) {
                        clearInterval(move); alert("خسرت! سكورك: " + score); initPepe();
                    }
                    if(x > stage.offsetWidth) { clearInterval(move); obs.remove(); score++; document.getElementById('liveScore').innerText = score; updateBest(score); }
                }, 20);
                loops.push(move);
                setTimeout(spawnObs, Math.random() * 1200 + 1000);
            }
            spawnObs();
        }

        function handleGlobalClick() {
            if(gameType === "pepe") {
                const p = document.getElementById('pepe');
                if(p.style.bottom === "120px") return;
                p.style.bottom = "120px";
                setTimeout(() => p.style.bottom = "15px", 350);
            }
        }

        // --- Memory Game (16 Cards) ---
        function initMemory() {
            clearAll();
            const stage = document.getElementById('activeGameContainer');
            const grid = document.createElement('div'); grid.className = 'mem-grid';
            const icons = ['⚖️','💎','🔥','🚀','🌙','👾','🍀','🎨'];
            const cards = [...icons, ...icons].sort(() => Math.random() - 0.5);
            let flipped = [];
            cards.forEach(icon => {
                const c = document.createElement('div'); c.className = 'card';
                c.onclick = (e) => { e.stopPropagation();
                    if(flipped.length < 2 && !c.innerText) {
                        c.innerText = icon; c.classList.add('flipped'); flipped.push(c);
                        if(flipped.length === 2) {
                            if(flipped[0].innerText === flipped[1].innerText) { flipped = []; }
                            else { setTimeout(() => { flipped.forEach(x => {x.innerText = ""; x.classList.remove('flipped');}); flipped = []; }, 600); }
                        }
                    }
                };
                grid.appendChild(c);
            });
            stage.appendChild(grid);
        }

        // --- Bubbles Game ---
        function initBubbles() {
            clearAll();
            const stage = document.getElementById('activeGameContainer');
            let bLoop = setInterval(() => {
                const b = document.createElement('div');
                b.style = `position:absolute; left:${Math.random()*85}%; top:${Math.random()*85}%; font-size:2.2rem; cursor:pointer; filter:drop-shadow(0 0 5px var(--neon-blue));`;
                b.innerHTML = "🫧";
                b.onclick = (e) => { e.stopPropagation(); b.remove(); };
                stage.appendChild(b);
                setTimeout(() => b.remove(), 1100);
            }, 650);
            loops.push(bLoop);
        }

        // --- Admin Core ---
        async function openAdmin() {
            document.getElementById('adminPanel').style.display = 'block';
            db.ref('rq_challenges').on('value', snap => {
                const list = document.getElementById('tasksList'); list.innerHTML = "";
                snap.forEach(t => {
                    list.innerHTML += `<div style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #222;">
                        <span>${t.val().ar}</span><button class="del-btn" onclick="removeTask('${t.key}')">حذف</button></div>`;
                });
            });
            db.ref('rq_users').on('value', snap => {
                const body = document.getElementById('usersList'); body.innerHTML = "";
                snap.forEach(u => {
                    const d = u.val();
                    body.innerHTML += `<tr><td>${d.info?.name || 'زائر'}</td><td>${Object.keys(d.history || {}).length} / 30</td>
                        <td><button class="reset-btn" onclick="resetUser('${u.key}')">تصفير</button></td></tr>`;
                });
            });
        }
        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }
        async function submitTask() {
            const ar = document.getElementById('addAr').value, en = document.getElementById('addEn').value;
            if(ar && en) { await db.ref('rq_challenges').push({ar, en}); document.getElementById('addAr').value=""; document.getElementById('addEn').value=""; }
        }
        async function removeTask(key) { if(confirm("حذف المهمة؟")) await db.ref(`rq_challenges/${key}`).remove(); }
        async function resetUser(key) { if(confirm("تصفير تقدم المستخدم نهائياً؟")) await db.ref(`rq_users/${key}/history`).remove(); }

        // --- Background Logic ---
        function uploadBG(i) {
            const reader = new FileReader();
            reader.onload = (e) => { document.body.style.backgroundImage = `url(${e.target.result})`; localStorage.setItem('user_bg', e.target.result); };
            reader.readAsDataURL(i.files[0]);
        }
        if(localStorage.getItem('user_bg')) document.body.style.backgroundImage = `url(${localStorage.getItem('user_bg')})`;

        // --- Core App Flow ---
        async function loadApp() {
            const today = new Date().toISOString().split('T')[0];
            const snap = await db.ref(`rq_users/${userId}`).once('value');
            const history = snap.val()?.history || {};
            const count = Object.keys(history).length;
            
            document.getElementById('progressFill').style.width = (Math.min(count, 30)/30*100) + "%";
            document.getElementById('progressText').innerText = `إنجازك: ${count} / 30 🔥`;

            if(history[today]) {
                document.getElementById('gameSection').style.display = 'block';
                startTimer(history[today].time);
            } else {
                const tasksSnap = await db.ref('rq_challenges').once('value');
                let tasks = []; tasksSnap.forEach(t => tasks.push(t.val()));
                let chosen = tasks[Math.floor(Math.random()*tasks.length)] || {ar: "قم بـ 15 دقيقة رياضة!", en: "Do 15 mins of exercise!"};
                document.getElementById('dailyTask').innerText = chosen.ar;
                document.getElementById('dailyTaskEn').innerText = chosen.en;
                document.getElementById('questUI').style.display = 'block';
            }
        }

        async function confirmDone() {
            const today = new Date().toISOString().split('T')[0];
            const now = Date.now();
            await db.ref(`rq_users/${userId}/history/${today}`).set({done: true, time: now});
            await db.ref(`rq_users/${userId}/info`).update({name: userName, lastSeen: now});
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            setTimeout(() => location.reload(), 1500);
        }

        function startTimer(doneTime) {
            setInterval(() => {
                const diff = (doneTime + 86400000) - Date.now();
                if(diff <= 0) location.reload();
                const h = Math.floor(diff/36e5).toString().padStart(2,'0');
                const m = Math.floor((diff%36e5)/6e4).toString().padStart(2,'0');
                const s = Math.floor((diff%6e4)/1000).toString().padStart(2,'0');
                document.getElementById('timerDisplay').innerText = `التحدي القادم: ${h}:${m}:${s}`;
            }, 1000);
        }

        loadApp();
    </script>
</body>
</html>
