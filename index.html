<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Random Quest 🚀</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Amiri+Quran&family=Caveat:wght@700&display=swap');

        :root { --gold: #ffcf4d; --pink: #ff75c3; --glass: rgba(255, 255, 255, 0.05); }

        body {
            font-family: 'Montserrat', sans-serif; margin: 0; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            background: #050518 no-repeat center center/cover;
            color: white; overflow: hidden; text-align: center; transition: 0.5s;
        }

        .brand-name {
            margin-top: 25px; font-size: 2.5rem; font-weight: 900;
            background: linear-gradient(45deg, var(--gold), var(--pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        .top-controls { position: absolute; top: 15px; width: 90%; display: flex; justify-content: space-between; z-index: 100; }
        .icon-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; backdrop-filter: blur(5px); }

        .challenge-card {
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px); padding: 20px; border-radius: 30px;
            width: 85%; margin-top: 30px; min-height: 120px; display: flex; flex-direction: column; justify-content: center;
        }

        .progress-container { width: 85%; margin-top: 20px; text-align: center; }
        .progress-bar { height: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 8px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), #ff8c00); width: 0%; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1); }

        .btn-main {
            background: linear-gradient(135deg, var(--gold), #ff8c00);
            color: black; border: none; padding: 15px 60px; border-radius: 50px;
            font-size: 1.5rem; font-family: 'Caveat', cursive; font-weight: bold; margin-top: 30px; cursor: pointer;
        }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; text-align: right;
        }

        .admin-sec { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 10px; }
        th, td { border: 1px solid #222; padding: 8px; text-align: center; }
        th { color: var(--gold); }
        .del-btn { background: #ff4757; color: white; border: none; padding: 4px 8px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body id="mainBody">

    <div class="top-controls">
        <button class="icon-btn" onclick="document.getElementById('bgInput').click()">🖼️</button>
        <button class="icon-btn" onclick="openAdmin()">⚙️</button>
    </div>
    <input type="file" id="bgInput" hidden accept="image/*" onchange="uploadBG(this)">

    <div class="brand-name">Random Quest</div>

    <div class="challenge-card">
        <div id="dailyTask" style="font-size: 1.5rem; font-weight: 800; line-height: 1.3;">...</div>
        <div id="dailyTaskEn" style="font-size: 0.9rem; opacity: 0.4; margin-top: 10px; font-style: italic;">...</div>
    </div>

    <div class="progress-container">
        <span id="progressText" style="font-size: 0.85rem; color: var(--gold);">إنجازك: 0 / 30 🔥</span>
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
    </div>

    <button id="doneBtn" class="btn-main" onclick="handleDone()">FIT / تم ✅</button>

    <div id="statusArea" style="display:none; margin-top: 20px;">
        <div style="color:var(--gold); font-size:1.1rem; font-weight: bold;">أحسنتِ! نراك غداً 🌟</div>
        <div id="nextQuestTimer" style="font-family: monospace; color: var(--pink); font-weight: bold;">00:00:00</div>
    </div>

    <div id="adminPanel" class="modal">
        <button onclick="closeAdmin()" style="color:#ff4757; background:none; border:none; font-size:1.5rem; float:left;">×</button>
        <h2 style="color:var(--gold); text-align:center;">لوحة الإدارة 🛠</h2>

        <div class="admin-sec">
            <h3>👥 سجل الزوار (Guestbook)</h3>
            <div id="userStatsList"></div>
        </div>

        <div class="admin-sec">
            <h3>📝 إدارة التحديات</h3>
            <div style="max-height: 200px; overflow-y: auto;">
                <table id="challengeTable">
                    <thead><tr><th>التحدي</th><th>حذف</th></tr></thead>
                    <tbody id="challengeTableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="admin-sec">
            <h3>➕ إضافة تحديات</h3>
            <textarea id="bulkAr" placeholder="بالعربي..." style="width:100%; height:50px; background:#111; color:white;"></textarea>
            <textarea id="bulkEn" placeholder="English..." style="width:100%; height:50px; margin-top:5px; background:#111; color:white;"></textarea>
            <button onclick="addTasks()" style="width:100%; padding:10px; background:#2ecc71; color:white; border:none; margin-top:10px; border-radius:8px;">إضافة</button>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://randomquest-app-default-rtdb.firebaseio.com/";
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe.user?.id || 8421694319;
        const todayStr = new Date().toISOString().split('T')[0];

        firebase.initializeApp({ databaseURL: FIREBASE_URL });
        const db = firebase.database();

        function uploadBG(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                document.body.style.backgroundImage = `url(${e.target.result})`;
                localStorage.setItem('userBG', e.target.result);
            };
            reader.readAsDataURL(file);
        }
        if(localStorage.getItem('userBG')) document.body.style.backgroundImage = `url(${localStorage.getItem('userBG')})`;

        async function loadApp() {
            const snapTasks = await db.ref('rq_challenges').once('value');
            const snapUser = await db.ref(`rq_users/${userId}`).once('value');
            const userData = snapUser.val() || {};
            const history = userData.history || {};
            
            const completedCount = Object.keys(history).length;
            document.getElementById('progressFill').style.width = (Math.min(completedCount, 30) / 30 * 100) + "%";
            document.getElementById('progressText').innerText = `إنجازك: ${completedCount} / 30 🔥`;

            let allTasks = []; snapTasks.forEach(t => {
                let data = t.val();
                data.key = t.key;
                allTasks.push(data);
            });

            const doneArs = Object.values(history).map(h => h.taskAr);
            let available = allTasks.filter(t => !doneArs.includes(t.ar));
            if(available.length === 0) available = allTasks;

            const seed = new Date().getDate() + userId;
            const chosen = available[Math.floor(Math.abs(Math.sin(seed) * 2000) % available.length)];
            
            document.getElementById('dailyTask').innerText = chosen.ar;
            document.getElementById('dailyTaskEn').innerText = chosen.en;
            window.currentTaskAr = chosen.ar;

            if(history[todayStr]) showDoneUI();
        }

        function handleDone() {
            confetti({ particleCount: 150, spread: 70 });
            db.ref(`rq_users/${userId}/history/${todayStr}`).set({ done: true, taskAr: window.currentTaskAr });
            db.ref(`rq_users/${userId}/info`).update({ name: tg.initDataUnsafe.user?.first_name || "Guest", lastSeen: Date.now() });
            showDoneUI();
        }

        function showDoneUI() {
            document.getElementById('doneBtn').disabled = true;
            document.getElementById('doneBtn').innerText = "تم بنجاح ✨";
            document.getElementById('statusArea').style.display = 'block';
            setInterval(() => {
                const diff = new Date().setHours(24,0,0,0) - new Date();
                const h = Math.floor(diff/36e5).toString().padStart(2,'0');
                const m = Math.floor((diff%36e5)/6e4).toString().padStart(2,'0');
                const s = Math.floor((diff%6e4)/1000).toString().padStart(2,'0');
                document.getElementById('nextQuestTimer').innerText = `التحدي القادم: ${h}:${m}:${s}`;
            }, 1000);
        }

        function openAdmin() {
            if(userId == 8421694319) {
                document.getElementById('adminPanel').style.display = 'block';
                loadAdminSections();
            }
        }

        function loadAdminSections() {
            // سجل الزوار
            db.ref('rq_users').on('value', s => {
                const users = s.val();
                let html = "<table><tr><th>الاسم</th><th>السكور</th></tr>";
                for(let id in users) {
                    const score = users[id].history ? Object.keys(users[id].history).length : 0;
                    html += `<tr><td>${users[id].info?.name || "مجهول"}</td><td>${score} 🔥</td></tr>`;
                }
                document.getElementById('userStatsList').innerHTML = html + "</table>";
            });

            // قائمة التحديات للحذف
            db.ref('rq_challenges').on('value', s => {
                const tasks = s.val();
                let html = "";
                for(let key in tasks) {
                    html += `<tr><td>${tasks[key].ar}</td><td><button class="del-btn" onclick="deleteTask('${key}')">🗑️</button></td></tr>`;
                }
                document.getElementById('challengeTableBody').innerHTML = html;
            });
        }

        function deleteTask(key) {
            if(confirm("هل أنتِ متأكدة من حذف هذا التحدي؟")) {
                db.ref(`rq_challenges/${key}`).remove();
            }
        }

        function addTasks() {
            const ar = document.getElementById('bulkAr').value;
            const en = document.getElementById('bulkEn').value;
            if(ar) {
                db.ref('rq_challenges').push({ ar: ar, en: en || "Quest" });
                document.getElementById('bulkAr').value = ""; document.getElementById('bulkEn').value = "";
            }
        }

        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }
        loadApp();
    </script>
</body>
</html>
