<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Random Quest - The Queen's Edition 👑</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Tajawal:wght@700&display=swap');
        
        :root {
            --neon-green: #39ff14;
            --neon-blue: #00ffff;
            --pink: #ff75c3;
            --bg-dark: #050510;
            --glass: rgba(255, 255, 255, 0.05);
            --border-glow: 0 0 15px rgba(57, 255, 20, 0.3);
        }

        /* الأساسيات */
        body {
            font-family: 'Montserrat', 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            background: var(--bg-dark) no-repeat center center/cover;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* الهيدر والتحكم */
        .header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            position: relative;
        }

        .brand-name {
            font-size: 2.6rem;
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(45deg, var(--neon-green), var(--neon-blue), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px var(--neon-green));
            animation: flow 3s linear infinite;
        }

        @keyframes flow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .top-controls {
            position: absolute;
            top: 20px;
            width: 90%;
            left: 5%;
            display: flex;
            justify-content: space-between;
            z-index: 2000;
        }

        .icon-btn {
            background: var(--glass);
            border: 1px solid rgba(57, 255, 20, 0.3);
            color: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            backdrop-filter: blur(10px);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: var(--border-glow);
        }

        .icon-btn:active { transform: scale(0.8); }

        /* منطقة الألعاب - Game Container */
        #gameSection {
            display: none;
            width: 94%;
            margin-top: 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .game-tabs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 15px;
        }

        #activeGameDisplay {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid var(--neon-green);
            border-radius: 30px;
            height: 320px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(57, 255, 20, 0.2), 0 0 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 2048 Game Styles */
        .grid-2048 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px;
            border-radius: 12px;
        }

        .tile-2048 {
            width: 55px;
            height: 55px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.15s ease-out;
        }

        .score-box {
            position: absolute;
            top: 15px;
            left: 20px;
            font-family: monospace;
            font-size: 1.4rem;
            color: var(--neon-green);
            text-shadow: 0 0 5px var(--neon-green);
        }

        /* Memory Grid */
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 15px;
            height: 100%;
            width: 100%;
        }

        .mem-card {
            background: #0a0a1a;
            border: 1px solid var(--neon-blue);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .mem-card.flipped {
            background: #1a1a2e;
            border-color: var(--neon-green);
            transform: rotateY(180deg);
        }

        /* UI التحديات */
        #questSection {
            display: none;
            width: 85%;
            text-align: center;
            padding: 40px 20px;
        }

        .quest-card {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid var(--neon-green);
            padding: 30px;
            border-radius: 35px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            position: relative;
        }

        .quest-card::before {
            content: "DAILY MISSION";
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--neon-green);
            color: black;
            padding: 2px 15px;
            font-size: 0.7rem;
            font-weight: bold;
            border-radius: 10px;
        }

        /* شريط التقدم */
        .progress-wrapper {
            width: 85%;
            margin: 20px 0 40px;
        }

        .bar-container {
            height: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-green), var(--neon-blue));
            width: 0%;
            transition: 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 0 15px var(--neon-green);
        }

        /* لوحة الإدارة الضخمة */
        .admin-panel {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 9999;
            padding: 30px;
            overflow-y: scroll;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }

        .admin-card {
            background: #0f0f1f;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #222;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #444;
            color: white;
            border-radius: 12px;
            margin: 10px 0;
            box-sizing: border-box;
        }

        .btn-action {
            background: var(--neon-green);
            color: black;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #222;
        }

        .reset-badge {
            background: #ff9f43;
            color: black;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body onclick="handleGlobalJump()">

    <div class="top-controls">
        <button id="bgBtn" class="icon-btn" onclick="document.getElementById('bgInput').click(); event.stopPropagation();" style="display:none;">🖼️</button>
        <button id="adminBtn" class="icon-btn" onclick="openAdmin(); event.stopPropagation();" style="display:none;">⚙️</button>
    </div>
    <input type="file" id="bgInput" hidden onchange="processBG(this)">

    <div class="header">
        <div class="brand-name">Random Quest</div>
    </div>

    <div id="questSection">
        <div class="quest-card">
            <h2 id="taskAr" style="margin: 0; font-size: 1.6rem;">جاري جلب التحدي...</h2>
            <p id="taskEn" style="opacity: 0.5; font-size: 0.9rem; margin-top: 10px;">...</p>
            <button class="btn-action" style="margin-top: 25px;" onclick="markAsDone()">DONE / تم ✅</button>
        </div>
    </div>

    <div id="gameSection">
        <div class="game-tabs">
            <button class="icon-btn" onclick="startMemory(); event.stopPropagation();">🧠</button>
            <button class="icon-btn" onclick="start2048(); event.stopPropagation();">🔢</button>
            <button class="icon-btn" onclick="startBubbles(); event.stopPropagation();">🫧</button>
        </div>
        <div id="activeGameDisplay"></div>
        <div id="leaderboardNotice" style="text-align: center; font-size: 0.7rem; color: var(--neon-blue); margin-top: 10px;"></div>
    </div>

    <div class="progress-wrapper">
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
            <span id="progressText" style="font-size: 0.8rem;">المستوى: 0 / 30</span>
            <span id="streakText" style="font-size: 0.8rem; color: var(--pink);">🔥 0 أيام</span>
        </div>
        <div class="bar-container">
            <div id="progressBar" class="bar-fill"></div>
        </div>
        <div id="countdown" style="text-align: center; font-size: 0.8rem; margin-top: 10px; color: var(--neon-green); font-weight: bold;"></div>
    </div>

    <div id="adminPanel" class="admin-panel">
        <div class="admin-header">
            <h1 style="color: var(--neon-green); margin:0;">إدارة زينب 👑</h1>
            <button onclick="closeAdmin()" style="background:none; border:none; color:red; font-size:2rem;">&times;</button>
        </div>

        <div class="admin-card">
            <h3 style="margin-top:0;">➕ إضافة تحدي جديد</h3>
            <input type="text" id="newAr" placeholder="التحدي بالعربية (مثلاً: 20 ضغط)">
            <input type="text" id="newEn" placeholder="Challenge in English">
            <button class="btn-action" onclick="saveTask()">إضافة للقاعدة</button>
        </div>

        <div class="admin-card">
            <h3 style="margin-top:0;">👥 إدارة المستخدمين (تصفير)</h3>
            <div id="userManagerList"></div>
        </div>

        <div class="admin-card">
            <h3 style="margin-top:0;">📜 التحديات المتوفرة</h3>
            <div id="tasksManagerList"></div>
        </div>
    </div>

    <script>
        // --- الإعدادات الفنية ---
        const DB_URL = "https://randomquest-app-default-rtdb.firebaseio.com/";
        const tg = window.Telegram.WebApp;
        const myID = 8421694319;
        const user = tg.initDataUnsafe.user || { id: myID, first_name: "زينب" };
        
        firebase.initializeApp({ databaseURL: DB_URL });
        const db = firebase.database();
        let gameActive = "", gameLoops = [];

        // إظهار أزرار الإدارة لزينب فقط
        if(user.id == myID) {
            document.getElementById('bgBtn').style.display = 'flex';
            document.getElementById('adminBtn').style.display = 'flex';
        }

        // تنظيف الألعاب
        function stopAll() {
            gameActive = "";
            gameLoops.forEach(clearInterval);
            gameLoops = [];
            document.getElementById('activeGameDisplay').innerHTML = "";
            window.onkeydown = null; // تنظيف أحداث الكيبورد
        }

        // --- 1. لعبة 2048 ---
        let board2048 = [];
        let score2048 = 0;

        function start2048() {
            stopAll();
            gameActive = "2048";
            score2048 = 0;
            board2048 = Array(16).fill(0);
            
            const stage = document.getElementById('activeGameDisplay');
            stage.innerHTML = `
                <div class="score-box" id="s2048">Score: 0</div>
                <div class="grid-2048" id="grid2048"></div>
                <div style="font-size:0.7rem; color:var(--pink); margin-top:5px;">Swipe or use Arrows to merge!</div>
            `;
            
            addRandomTile();
            addRandomTile();
            updateBoardUI();
            getTopScore();

            // أحداث الكيبورد
            window.onkeydown = (e) => {
                if(gameActive !== "2048") return;
                let moved = false;
                if(e.key === "ArrowUp") moved = move2048('up');
                if(e.key === "ArrowDown") moved = move2048('down');
                if(e.key === "ArrowLeft") moved = move2048('left');
                if(e.key === "ArrowRight") moved = move2048('right');
                
                if(moved) {
                    addRandomTile();
                    updateBoardUI();
                    if(isGameOver()) {
                        alert("انتهت اللعبة! مجموع نقاطك: " + score2048);
                        saveHighScore(score2048);
                    }
                }
            };

            // دعم السحب (Touch Swipe) للموبايل
            let touchStartX, touchStartY;
            stage.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }, {passive: true});

            stage.addEventListener('touchend', (e) => {
                if(gameActive !== "2048") return;
                let dx = e.changedTouches[0].clientX - touchStartX;
                let dy = e.changedTouches[0].clientY - touchStartY;
                let moved = false;
                if(Math.abs(dx) > Math.abs(dy)) {
                    if(dx > 30) moved = move2048('right');
                    else if(dx < -30) moved = move2048('left');
                } else {
                    if(dy > 30) moved = move2048('down');
                    else if(dy < -30) moved = move2048('up');
                }
                if(moved) { addRandomTile(); updateBoardUI(); }
            }, {passive: true});
        }

        function addRandomTile() {
            let empty = board2048.map((v, i) => v === 0 ? i : null).filter(v => v !== null);
            if(empty.length) {
                board2048[empty[Math.floor(Math.random() * empty.length)]] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function updateBoardUI() {
            const grid = document.getElementById('grid2048');
            const colors = {
                2: '#eee4da', 4: '#ede0c8', 8: '#f2b179', 16: '#f59563',
                32: '#f67c5f', 64: '#f65e3b', 128: '#edcf72', 256: '#edcc61',
                512: '#edc850', 1024: '#edc53f', 2048: '#39ff14'
            };
            grid.innerHTML = board2048.map(val => `
                <div class="tile-2048" style="background:${val ? colors[val] || '#3c3a32' : 'rgba(255,255,255,0.05)'}; 
                color:${val <= 4 ? '#776e65' : 'white'}; 
                box-shadow: ${val ? '0 0 10px '+colors[val] : 'none'}">
                    ${val || ''}
                </div>
            `).join('');
            document.getElementById('s2048').innerText = "Score: " + score2048;
        }

        function move2048(dir) {
            let moved = false;
            let size = 4;
            
            const get = (r, c) => board2048[r * size + c];
            const set = (r, c, v) => board2048[r * size + c] = v;

            for (let i = 0; i < size; i++) {
                let line = [];
                for (let j = 0; j < size; j++) {
                    let v = (dir==='up'||dir==='down') ? get(j, i) : get(i, j);
                    if(v) line.push(v);
                }
                if(dir==='down'||dir==='right') line.reverse();
                
                let newLine = [];
                for (let j = 0; j < line.length; j++) {
                    if(line[j] === line[j+1]) {
                        newLine.push(line[j] * 2);
                        score2048 += line[j] * 2;
                        j++;
                        moved = true;
                    } else {
                        newLine.push(line[j]);
                    }
                }
                while(newLine.length < size) newLine.push(0);
                if(dir==='down'||dir==='right') newLine.reverse();

                for (let j = 0; j < size; j++) {
                    let oldV = (dir==='up'||dir==='down') ? get(j, i) : get(i, j);
                    let newV = newLine[j];
                    if(oldV !== newV) moved = true;
                    if(dir==='up'||dir==='down') set(j, i, newV); else set(i, j, newV);
                }
            }
            return moved;
        }

        function isGameOver() {
            if(board2048.includes(0)) return false;
            for(let i=0; i<16; i++) {
                if(i%4<3 && board2048[i] === board2048[i+1]) return false;
                if(i<12 && board2048[i] === board2048[i+4]) return false;
            }
            return true;
        }

        function handleGlobalJump() {
            // فارغ لأن لعبة 2048 لا تستخدم القفز
        }

        async function saveHighScore(s) {
            const ref = db.ref(`rq_scores/${user.id}`);
            const current = await ref.once('value');
            if(s > (current.val()?.score || 0)) {
                await ref.set({ name: user.first_name, score: s });
            }
        }

        async function getTopScore() {
            const snap = await db.ref('rq_scores').orderByChild('score').limitToLast(1).once('value');
            snap.forEach(d => {
                document.getElementById('leaderboardNotice').innerText = `المتصدر الحالي: ${d.val().name} (${d.val().score} نقطة)`;
            });
        }

        // --- 2. لعبة الذاكرة (16 بطاقة) ---
        function startMemory() {
            stopAll();
            const stage = document.getElementById('activeGameDisplay');
            const grid = document.createElement('div'); grid.className = 'memory-grid';
            const icons = ['⚖️','📚','💻','💎','🔥','🚀','🌙','👾'];
            const deck = [...icons, ...icons].sort(() => Math.random() - 0.5);
            let flipped = [];

            deck.forEach(icon => {
                const c = document.createElement('div');
                c.className = 'mem-card';
                c.onclick = (e) => {
                    e.stopPropagation();
                    if(flipped.length < 2 && !c.innerText) {
                        c.innerText = icon; c.classList.add('flipped');
                        flipped.push(c);
                        if(flipped.length === 2) {
                            if(flipped[0].innerText === flipped[1].innerText) {
                                flipped = [];
                            } else {
                                setTimeout(() => {
                                    flipped.forEach(f => { f.innerText = ""; f.classList.remove('flipped'); });
                                    flipped = [];
                                }, 600);
                            }
                        }
                    }
                };
                grid.appendChild(c);
            });
            stage.appendChild(grid);
        }

        // --- 3. لعبة الفقاعات ---
        function startBubbles() {
            stopAll();
            const stage = document.getElementById('activeGameDisplay');
            let loop = setInterval(() => {
                const b = document.createElement('div');
                b.innerHTML = "🫧";
                b.style = `position:absolute; left:${Math.random()*85}%; top:${Math.random()*85}%; font-size:2.2rem; cursor:pointer; filter:drop-shadow(0 0 5px var(--neon-blue));`;
                b.onclick = (e) => { e.stopPropagation(); b.remove(); };
                stage.appendChild(b);
                setTimeout(() => b.remove(), 1200);
            }, 700);
            gameLoops.push(loop);
        }

        // --- إدارة النظام (ADMIN) ---
        async function openAdmin() {
            document.getElementById('adminPanel').style.display = 'block';
            
            // جلب المستخدمين للتصفير
            db.ref('rq_users').on('value', snap => {
                const list = document.getElementById('userManagerList');
                list.innerHTML = "";
                snap.forEach(u => {
                    const d = u.val();
                    const histCount = d.history ? Object.keys(d.history).length : 0;
                    list.innerHTML += `
                        <div class="user-row">
                            <span>${d.info?.name || 'مجهول'} (${histCount}/30)</span>
                            <span class="reset-badge" onclick="resetUserLevel('${u.key}')">تصفير المستوى</span>
                        </div>`;
                });
            });

            // جلب التحديات للحذف
            db.ref('rq_challenges').on('value', snap => {
                const list = document.getElementById('tasksManagerList');
                list.innerHTML = "";
                snap.forEach(t => {
                    list.innerHTML += `
                        <div class="user-row">
                            <span>${t.val().ar}</span>
                            <button onclick="delTask('${t.key}')" style="background:none; border:none; color:red;">حذف</button>
                        </div>`;
                });
            });
        }

        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }

        async function saveTask() {
            const ar = document.getElementById('newAr').value;
            const en = document.getElementById('newEn').value;
            if(ar && en) {
                await db.ref('rq_challenges').push({ ar, en });
                document.getElementById('newAr').value = "";
                document.getElementById('newEn').value = "";
            }
        }

        async function delTask(id) { if(confirm("حذف هذا التحدي؟")) await db.ref(`rq_challenges/${id}`).remove(); }

        async function resetUserLevel(id) {
            if(confirm("هل أنتِ متأكدة من تصفير مستوى هذا المستخدم نهائياً؟")) {
                await db.ref(`rq_users/${id}/history`).remove();
                alert("تم التصفير بنجاح");
            }
        }

        // --- الخلفية ---
        function processBG(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.body.style.backgroundImage = `url(${e.target.result})`;
                localStorage.setItem('custom_bg', e.target.result);
            };
            reader.readAsDataURL(input.files[0]);
        }
        if(localStorage.getItem('custom_bg')) document.body.style.backgroundImage = `url(${localStorage.getItem('custom_bg')})`;

        // --- تهيئة التطبيق ---
        async function initApp() {
            const today = new Date().toISOString().split('T')[0];
            const snap = await db.ref(`rq_users/${user.id}`).once('value');
            const data = snap.val() || {};
            const history = data.history || {};
            const count = Object.keys(history).length;

            // تحديث شريط التقدم
            document.getElementById('progressBar').style.width = (Math.min(count, 30) / 30 * 100) + "%";
            document.getElementById('progressText').innerText = `المستوى: ${count} / 30`;

            if(history[today]) {
                // المستخدم أكمل التحدي
                document.getElementById('gameSection').style.display = 'block';
                document.getElementById('questSection').style.display = 'none';
                startCountdown(history[today].time);
            } else {
                // جلب تحدي عشوائي
                const tSnap = await db.ref('rq_challenges').once('value');
                let tasks = [];
                tSnap.forEach(t => tasks.push(t.val()));
                let finalTask = tasks[Math.floor(Math.random() * tasks.length)] || { ar: "قم بتمارين ضغط!", en: "Do some pushups!" };
                document.getElementById('taskAr').innerText = finalTask.ar;
                document.getElementById('taskEn').innerText = finalTask.en;
                document.getElementById('questSection').style.display = 'block';
            }
        }

        async function markAsDone() {
            const today = new Date().toISOString().split('T')[0];
            const now = Date.now();
            await db.ref(`rq_users/${user.id}/history/${today}`).set({ done: true, time: now });
            await db.ref(`rq_users/${user.id}/info`).update({ name: user.first_name, lastSeen: now });
            
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            setTimeout(() => location.reload(), 1500);
        }

        function startCountdown(startTime) {
            setInterval(() => {
                const remaining = (startTime + 86400000) - Date.now();
                if(remaining <= 0) location.reload();
                const h = Math.floor(remaining/36e5).toString().padStart(2,'0');
                const m = Math.floor((remaining%36e5)/6e4).toString().padStart(2,'0');
                const s = Math.floor((remaining%6e4)/1000).toString().padStart(2,'0');
                document.getElementById('countdown').innerText = `التحدي القادم خلال: ${h}:${m}:${s}`;
            }, 1000);
        }

        initApp();
    </script>
</body>
</html>
