<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Random Quest 🚀</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Amiri+Quran&family=Caveat:wght@700&display=swap');

        :root { --gold: #ffcf4d; --pink: #ff75c3; --glass: rgba(255, 255, 255, 0.1); }

        body {
            font-family: 'Montserrat', sans-serif; margin: 0; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            background: #050518 no-repeat center center/cover; /* سيتغير بالرفع */
            color: white; overflow-x: hidden; text-align: center; transition: 0.5s;
        }

        .brand-name {
            margin-top: 30px; font-size: 3rem; font-weight: 900;
            background: linear-gradient(45deg, var(--gold), var(--pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        /* أزرار التحكم العلوية */
        .top-controls { position: absolute; top: 15px; width: 90%; display: flex; justify-content: space-between; }
        .icon-btn { background: var(--glass); border: none; color: white; padding: 10px; border-radius: 50%; cursor: pointer; backdrop-filter: blur(5px); }

        /* بطاقة التحدي الشفافة */
        .challenge-card {
            background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(12px); padding: 30px 20px; border-radius: 30px;
            width: 85%; margin-top: 40px; min-height: 150px;
            display: flex; flex-direction: column; justify-content: center;
        }

        /* شريط التقدم 30/1 */
        .progress-container { width: 85%; margin-top: 20px; text-align: right; }
        .progress-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 5px; }
        .progress-fill { height: 100%; background: var(--gold); width: 0%; transition: 1s; }

        .btn-main {
            background: linear-gradient(135deg, var(--gold), #ff8c00);
            color: black; border: none; padding: 15px 60px; border-radius: 50px;
            font-size: 1.6rem; font-family: 'Caveat', cursive; font-weight: bold;
            margin-top: 30px; cursor: pointer; box-shadow: 0 10px 25px rgba(255, 207, 77, 0.4);
        }

        /* لوحات التحكم */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto;
        }

        #habitBox { display:none; background: var(--glass); padding: 15px; border-radius: 20px; margin-top: 20px; }
    </style>
</head>
<body id="mainBody">

    <div class="top-controls">
        <button class="icon-btn" onclick="document.getElementById('bgInput').click()">🖼️</button>
        <button class="icon-btn" onclick="openAdmin()">⚙️</button>
    </div>
    <input type="file" id="bgInput" hidden accept="image/*" onchange="uploadBG(this)">

    <div class="brand-name">Random Quest</div>

    <div class="challenge-card">
        <div id="dailyTask" style="font-size: 1.7rem; font-weight: bold;">جاري جلب التحدي...</div>
        <div id="dailyTaskEn" style="font-size: 1rem; opacity: 0.5; margin-top: 10px;">Loading...</div>
    </div>

    <div class="progress-container">
        <span id="progressText" style="font-size: 0.9rem;">التحديات المكتملة: 0 / 30</span>
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
    </div>

    <button id="doneBtn" class="btn-main" onclick="handleDone()">FIT / تم ✅</button>

    <div id="statusArea" style="display:none; margin-top:20px;">
        <div style="color:var(--gold); font-size:1.2rem;">بطل! نراك غداً 🌟</div>
        <div id="nextQuestTimer" style="font-family:monospace; margin-top:5px;">00:00:00</div>
    </div>

    <div id="habitBox">
        <h3 style="color:var(--gold)">صندوق العادات المفتوح 🔓</h3>
        <div id="habitList"></div>
    </div>

    <div id="adminPanel" class="modal">
        <button onclick="closeAdmin()" style="color:red; float:left;">إغلاق ×</button>
        <h2 style="color:var(--gold)">لوحة التحكم 🛠</h2>
        <button onclick="saveToCloud()" style="width:100%; padding:15px; background:var(--gold); border:none; border-radius:10px; font-weight:bold;">حفظ بيانات المستخدمين في السحابة ☁️</button>
        <div id="userStats" style="margin-top:20px; text-align:right;"></div>
        <hr>
        <textarea id="bulkAr" placeholder="تحديات بالعربي (كل سطر واحد)" style="width:100%; height:100px;"></textarea>
        <textarea id="bulkEn" placeholder="Challenges in English..." style="width:100%; height:100px; margin-top:10px;"></textarea>
        <button onclick="addTasks()" style="width:100%; padding:15px; background:green; color:white; border:none; margin-top:10px;">إضافة التحديات</button>
    </div>

    <script>
        const BOT_TOKEN = "8066162864:AAEcmBdXICIK6Sa4mD_91TjECBvnUCOrI48";
        const FIREBASE_URL = "https://randomquest-app-default-rtdb.firebaseio.com/";
        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe.user?.id || 8421694319;
        const todayStr = new Date().toISOString().split('T')[0];

        firebase.initializeApp({ databaseURL: FIREBASE_URL });
        const db = firebase.database();

        // نظام الخلفية
        function uploadBG(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                document.body.style.backgroundImage = `url(${e.target.result})`;
                localStorage.setItem('userBG', e.target.result);
            };
            reader.readAsDataURL(file);
        }
        if(localStorage.getItem('userBG')) document.body.style.backgroundImage = `url(${localStorage.getItem('userBG')})`;

        async function loadApp() {
            const snapTasks = await db.ref('rq_challenges').once('value');
            const snapUser = await db.ref(`rq_users/${userId}`).once('value');
            const userData = snapUser.val() || {};
            const history = userData.history || {};
            
            // تحديث شريط التقدم
            const completedCount = Object.keys(history).length;
            document.getElementById('progressFill').style.width = (completedCount / 30 * 100) + "%";
            document.getElementById('progressText').innerText = `التحديات المكتملة: ${completedCount} / 30`;

            if(completedCount >= 30) {
                document.getElementById('habitBox').style.display = 'block';
                renderHabits(history);
            }

            // اختيار تحدي لم يظهر من قبل
            let allTasks = []; snapTasks.forEach(t => allTasks.push(t.val()));
            const doneArs = Object.values(history).map(h => h.taskAr);
            let available = allTasks.filter(t => !doneArs.includes(t.ar));

            if(available.length === 0) available = allTasks;

            const seed = new Date().getDate() + userId;
            const chosen = available[Math.floor(Math.abs(Math.sin(seed) * 1000) % available.length)];
            
            document.getElementById('dailyTask').innerText = chosen.ar;
            document.getElementById('dailyTaskEn').innerText = chosen.en;
            window.currentTaskAr = chosen.ar;

            if(history[todayStr]) showDoneUI();
        }

        function handleDone() {
            confetti({ particleCount: 150, spread: 70 });
            db.ref(`rq_users/${userId}/history/${todayStr}`).set({ done: true, taskAr: window.currentTaskAr });
            db.ref(`rq_users/${userId}/info`).update({ name: tg.initDataUnsafe.user?.first_name || "Admin", lastSeen: Date.now() });
            showDoneUI();
        }

        function showDoneUI() {
            document.getElementById('doneBtn').disabled = true;
            document.getElementById('statusArea').style.display = 'block';
            setInterval(() => {
                const diff = new Date().setHours(24,0,0,0) - new Date();
                const h = Math.floor(diff/36e5).toString().padStart(2,'0');
                const m = Math.floor((diff%36e5)/6e4).toString().padStart(2,'0');
                const s = Math.floor((diff%6e4)/1000).toString().padStart(2,'0');
                document.getElementById('nextQuestTimer').innerText = `التحدي القادم: ${h}:${m}:${s}`;
            }, 1000);
        }

        function openAdmin() { if(userId == 8421694319) document.getElementById('adminPanel').style.display = 'block'; }
        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }

        function saveToCloud() {
            alert("تمت مزامنة بيانات جميع المستخدمين مع السحابة بنجاح لضمان دقة المؤقت وعدم تكرار المهام.");
        }

        function addTasks() {
            const ar = document.getElementById('bulkAr').value.split('\n').filter(x => x.trim());
            const en = document.getElementById('bulkEn').value.split('\n').filter(x => x.trim());
            ar.forEach((t, i) => db.ref('rq_challenges').push({ ar: t, en: en[i] || "Quest" }));
            alert("تمت الإضافة!");
        }

        loadApp();
    </script>
</body>
</html>
