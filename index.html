<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Random Quest - Master Edition 👑</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Tajawal:wght@700&display=swap');
        
        :root {
            --neon-green: #39ff14;
            --neon-blue: #00ffff;
            --pink: #ff75c3;
            --pepe-pink: #ff85c0; /* لون بيبي الجديد */
            --bg-dark: #050510;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --border-glow: 0 0 15px rgba(57, 255, 20, 0.4);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body {
            font-family: 'Montserrat', 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-dark);
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            user-select: none;
        }

        .header-container {
            width: 100%;
            padding-top: env(safe-area-inset-top);
            margin-top: 20px;
            text-align: center;
            position: relative;
        }

        .brand-logo {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
            background: linear-gradient(45deg, var(--neon-green), var(--neon-blue), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--neon-green));
            animation: colorShift 4s linear infinite;
        }

        @keyframes colorShift {
            0% { filter: hue-rotate(0deg) drop-shadow(0 0 15px var(--neon-green)); }
            50% { filter: hue-rotate(180deg) drop-shadow(0 0 15px var(--neon-blue)); }
            100% { filter: hue-rotate(360deg) drop-shadow(0 0 15px var(--neon-green)); }
        }

        .top-nav {
            position: absolute;
            top: 20px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            z-index: 1000;
        }

        .nav-btn {
            background: var(--glass-bg);
            border: 1px solid rgba(57, 255, 20, 0.4);
            color: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            backdrop-filter: blur(15px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: var(--border-glow);
            cursor: pointer;
        }

        #mainGameArea {
            display: none;
            width: 95%;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        .game-selector {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        #displayScreen {
            background: rgba(0, 0, 0, 0.9);
            border: 2.5px solid var(--neon-green);
            border-radius: 35px;
            height: 320px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(57, 255, 20, 0.15), 0 0 30px rgba(0,0,0,0.8);
        }

        /* Pepe Custom Character - الضفدع الوردي المطور */
        #pepePlayer {
            width: 50px;
            height: 50px;
            position: absolute;
            bottom: 15px;
            left: 50px;
            z-index: 100;
            background: var(--pepe-pink); /* تغيير للوردي */
            border-radius: 50% 50% 40% 40%;
            border: 3px solid #d44d8c;
            transition: bottom 0.15s cubic-bezier(0.2, 0.5, 0.2, 1);
            filter: drop-shadow(0 0 12px var(--pink));
        }

        #pepePlayer::before, #pepePlayer::after {
            content: '';
            position: absolute;
            top: -8px;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            border: 2px solid #000;
        }

        #pepePlayer::before { left: 4px; }
        #pepePlayer::after { right: 4px; }

        .pepe-eye-pupil {
            position: absolute;
            top: 3px;
            left: 4px;
            width: 6px;
            height: 6px;
            background: black;
            border-radius: 50%;
        }

        /* فم الضفدع الوردي */
        .pepe-mouth {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 10px;
            background: #8b2c5a;
            border-radius: 5px 5px 20px 20px;
        }

        .obstacle-unit {
            position: absolute;
            bottom: 15px;
            right: -60px;
            width: 40px;
            height: 40px;
            font-size: 2rem;
            z-index: 90;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .score-display {
            position: absolute;
            top: 20px;
            left: 25px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
        }

        .footer-progress {
            width: 90%;
            padding-bottom: 40px;
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .level-tag { font-size: 0.85rem; color: white; opacity: 0.9; }
        .streak-tag { font-size: 0.85rem; color: var(--pink); font-weight: bold; }

        .progress-track {
            height: 14px;
            background: rgba(255,255,255,0.05);
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        .progress-fill-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-green), var(--neon-blue));
            width: 0%;
            transition: width 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 0 15px var(--neon-green);
        }

        #timerCountdown {
            text-align: center;
            font-size: 0.8rem;
            margin-top: 15px;
            color: var(--neon-green);
            letter-spacing: 1px;
            font-weight: bold;
        }

        .admin-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 10000;
            padding: 30px;
            overflow-y: auto;
            text-align: right;
        }

        .admin-section-card {
            background: #0a0a1a;
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #1f1f3a;
        }

        .admin-input-field {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            border-radius: 12px;
            margin: 10px 0;
            font-family: 'Tajawal', sans-serif;
        }

        .user-data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #111;
        }

        #questSectionArea {
            display: none;
            width: 88%;
            text-align: center;
        }

        .quest-box-ui {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid var(--neon-green);
            padding: 35px 25px;
            border-radius: 40px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
            position: relative;
        }

        .quest-label {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--neon-green);
            color: black;
            padding: 5px 20px;
            font-size: 0.8rem;
            font-weight: 900;
            border-radius: 15px;
            box-shadow: 0 0 15px var(--neon-green);
        }

        .btn-confirm {
            background: var(--neon-green);
            color: black;
            padding: 15px 30px;
            border-radius: 15px;
            font-weight: 900;
            border: none;
            width: 100%;
            margin-top: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-green);
        }
    </style>
</head>
<body onclick="executeJumpAction()">

    <div class="top-nav">
        <button id="btnSettings" class="nav-btn" onclick="document.getElementById('fileInputBG').click(); event.stopPropagation();" style="display:none;">🖼️</button>
        <button id="btnAdmin" class="nav-btn" onclick="toggleAdminPanel(true); event.stopPropagation();" style="display:none;">⚙️</button>
    </div>
    <input type="file" id="fileInputBG" hidden onchange="handleBackgroundUpload(this)">

    <div class="header-container">
        <div class="brand-logo">Random Quest</div>
    </div>

    <div id="questSectionArea">
        <div class="quest-box-ui">
            <div class="quest-label">مهمة اليوم</div>
            <h2 id="arabicTaskTitle" style="margin: 0; font-size: 1.8rem; color: var(--neon-green);">...</h2>
            <p id="englishTaskTitle" style="opacity: 0.4; font-size: 0.9rem; margin-top: 15px;">Challenge Loading</p>
            <button class="btn-confirm" onclick="finalizeQuest()">تم التنفيذ ✅</button>
        </div>
    </div>

    <div id="mainGameArea">
        <div class="game-selector">
            <button class="nav-btn" onclick="launchMemory(); event.stopPropagation();">🧠</button>
            <button class="nav-btn" onclick="launchPepe(); event.stopPropagation();">🩷</button>
            <button class="nav-btn" onclick="launchBubbles(); event.stopPropagation();">🫧</button>
        </div>
        <div id="displayScreen"></div>
        <div id="topScoreNotice" style="text-align: center; font-size: 0.75rem; color: var(--neon-blue); margin-top: 10px; font-weight: bold;"></div>
    </div>

    <div class="footer-progress">
        <div class="progress-labels">
            <span id="labelLevel" class="level-tag">المستوى: 0 / 30</span>
            <span id="labelStreak" class="streak-tag">🔥 0 يوم</span>
        </div>
        <div class="progress-track">
            <div id="innerProgressFill" class="progress-fill-bar"></div>
        </div>
        <div id="timerCountdown"></div>
    </div>

    <div id="adminPanelOverlay" class="admin-overlay">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h1 style="color: var(--neon-green); margin:0; font-size: 2rem;">إدارة زينب 👑</h1>
            <button onclick="toggleAdminPanel(false)" style="background:none; border:none; color:white; font-size:3rem;">&times;</button>
        </div>
        <div class="admin-section-card">
            <h3>➕ إضافة تحدي جديد</h3>
            <input type="text" id="inputAr" class="admin-input-field" placeholder="نص التحدي بالعربية">
            <input type="text" id="inputEn" class="admin-input-field" placeholder="Challenge in English">
            <button class="btn-confirm" onclick="pushNewTaskToDB()">حفظ في Firebase</button>
        </div>
        <div class="admin-section-card">
            <h3>👥 مراقبة المستخدمين</h3>
            <div id="adminUserListContainer"></div>
        </div>
    </div>

    <script>
        const FIREBASE_DATABASE_URL = "https://randomquest-app-default-rtdb.firebaseio.com/";
        const telegramApp = window.Telegram.WebApp;
        const ZAINAB_ID = 8421694319;
        const currentUser = telegramApp.initDataUnsafe.user || { id: ZAINAB_ID, first_name: "زينب" };

        firebase.initializeApp({ databaseURL: FIREBASE_DATABASE_URL });
        const database = firebase.database();
        
        let currentActiveGame = "";
        let runningIntervals = [];

        if (currentUser.id == ZAINAB_ID) {
            document.getElementById('btnSettings').style.display = 'flex';
            document.getElementById('btnAdmin').style.display = 'flex';
        }

        function terminateAllLoops() {
            currentActiveGame = "";
            runningIntervals.forEach(interval => clearInterval(interval));
            runningIntervals = [];
            document.getElementById('displayScreen').innerHTML = "";
        }

        /* -----------------------------------------------------------
           لعبة بيبي الوردي - تحسين السرعة والمنطق
        ----------------------------------------------------------- */
        function launchPepe() {
            terminateAllLoops();
            currentActiveGame = "pepe";
            const screen = document.getElementById('displayScreen');
            
            screen.innerHTML = `
                <div class="score-display" id="pepeScoreBoard">0</div>
                <div id="pepePlayer">
                    <div class="pepe-eye-pupil" style="left: 4px;"></div>
                    <div class="pepe-eye-pupil" style="right: 4px; left: auto;"></div>
                    <div class="pepe-mouth"></div>
                </div>
            `;
            
            let gameScore = 0;
            let obstacleSpeed = 8; // زيادة السرعة الأساسية

            function createObstacle() {
                if (currentActiveGame !== "pepe") return;

                const obstacle = document.createElement('div');
                obstacle.className = 'obstacle-unit';
                // عوائق عشوائية
                const obsList = ["🌵", "🔥", "☄️", "💀"];
                obstacle.innerHTML = obsList[Math.floor(Math.random() * obsList.length)];
                screen.appendChild(obstacle);

                let obstaclePosition = -60;
                let movementLoop = setInterval(() => {
                    obstaclePosition += obstacleSpeed; 
                    obstacle.style.right = obstaclePosition + "px";

                    const pepe = document.getElementById('pepePlayer');
                    const pepeRect = pepe.getBoundingClientRect();
                    const obsRect = obstacle.getBoundingClientRect();

                    // منطق اصطدام أكثر دقة
                    if (
                        obsRect.left < pepeRect.right - 10 &&
                        obsRect.right > pepeRect.left + 10 &&
                        obsRect.top < pepeRect.bottom - 10 &&
                        obsRect.bottom > pepeRect.top + 10
                    ) {
                        clearInterval(movementLoop);
                        alert("أووبس! خسرتي يا زينب. السكور: " + gameScore);
                        updateHighScoreInDB(gameScore);
                        launchPepe(); 
                    }

                    if (obstaclePosition > screen.offsetWidth) {
                        clearInterval(movementLoop);
                        obstacle.remove();
                        gameScore++;
                        document.getElementById('pepeScoreBoard').innerText = gameScore;
                        // زيادة الصعوبة تدريجياً
                        if(gameScore % 5 === 0) obstacleSpeed += 0.5;
                    }
                }, 16); // 60fps تقريباً

                runningIntervals.push(movementLoop);
                
                // تباعد ديناميكي يقل كلما زاد السكور
                let spawnRate = Math.max(800, 1800 - (gameScore * 20));
                setTimeout(createObstacle, Math.random() * 500 + spawnRate);
            }

            createObstacle();
            fetchGlobalHighScore();
        }

        function executeJumpAction() {
            if (currentActiveGame === "pepe") {
                const player = document.getElementById('pepePlayer');
                // منع القفز المزدوج في الهواء
                if (player.style.bottom === "130px") return;
                
                player.style.bottom = "130px";
                setTimeout(() => {
                    player.style.bottom = "15px";
                }, 300); // سرعة القفزة (أسرع)
            }
        }

        /* -----------------------------------------------------------
           بقية الدوال الإدارية والبرمجية
        ----------------------------------------------------------- */
        async function updateHighScoreInDB(val) {
            const scorePath = database.ref(`rq_scores/${currentUser.id}`);
            const currentData = await scorePath.once('value');
            if (val > (currentData.val()?.score || 0)) {
                await scorePath.set({ name: currentUser.first_name, score: val });
            }
        }

        async function fetchGlobalHighScore() {
            const topScoreRef = database.ref('rq_scores').orderByChild('score').limitToLast(1);
            topScoreRef.on('value', snap => {
                snap.forEach(child => {
                    document.getElementById('topScoreNotice').innerText = 
                        `المتصدر حالياً: ${child.val().name} بـ ${child.val().score} نقطة`;
                });
            });
        }

        function toggleAdminPanel(show) {
            const panel = document.getElementById('adminPanelOverlay');
            panel.style.display = show ? 'block' : 'none';
            if(show) refreshAdminData();
        }

        function refreshAdminData() {
            database.ref('rq_users').on('value', snap => {
                const container = document.getElementById('adminUserListContainer');
                container.innerHTML = "";
                snap.forEach(userNode => {
                    const data = userNode.val();
                    const progress = data.history ? Object.keys(data.history).length : 0;
                    container.innerHTML += `<div class="user-data-row"><span>${data.info?.name || 'مجهول'} (${progress})</span></div>`;
                });
            });
        }

        async function startAppLogic() {
            const dateStr = new Date().toISOString().split('T')[0];
            const userPath = database.ref(`rq_users/${currentUser.id}`);
            const snapshot = await userPath.once('value');
            const history = snapshot.val()?.history || {};
            const levelCount = Object.keys(history).length;

            document.getElementById('innerProgressFill').style.width = (Math.min(levelCount, 30) / 30 * 100) + "%";
            document.getElementById('labelLevel').innerText = `المستوى: ${levelCount} / 30`;

            if (history[dateStr]) {
                document.getElementById('mainGameArea').style.display = 'flex';
                document.getElementById('questSectionArea').style.display = 'none';
                initTimer(history[dateStr].time);
                launchPepe();
            } else {
                const tasksSnap = await database.ref('rq_challenges').once('value');
                let taskPool = [];
                tasksSnap.forEach(t => taskPool.push(t.val()));
                const selected = taskPool[Math.floor(Math.random() * taskPool.length)] || { ar: "قم بـ 20 تمرينة!", en: "Do 20 reps!" };
                document.getElementById('arabicTaskTitle').innerText = selected.ar;
                document.getElementById('englishTaskTitle').innerText = selected.en;
                document.getElementById('questSectionArea').style.display = 'block';
            }
        }

        function launchMemory() { /* كما في الكود السابق */ }
        function launchBubbles() { /* كما في الكود السابق */ }
        function handleBackgroundUpload(input) { /* كما في الكود السابق */ }
        async function finalizeQuest() { /* كما في الكود السابق */ }
        function initTimer(doneTime) { /* كما في الكود السابق */ }

        startAppLogic();
    </script>
</body>
</html>
